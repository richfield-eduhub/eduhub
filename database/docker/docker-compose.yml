version: '2'

services:
  db:
    image: postgres:16
    container_name: eduhub_db
    environment:
      POSTGRES_DB: eduhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5433:5432"
    volumes:
      - eduhub_pgdata:/var/lib/postgresql/data
      - ../init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: eduhub_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduhub.ac.za
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - eduhub_pgadmin:/var/lib/pgadmin
    depends_on:
      - db

volumes:
  eduhub_pgdata:
    driver: local
  eduhub_pgadmin:
    driver: local
