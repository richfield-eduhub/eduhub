services:
  db:
    image: postgres:16
    container_name: eduhub_db
    environment:
      POSTGRES_DB: eduhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5433:5432"
    volumes:
      - eduhub_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduhub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  backend:
    image: node:20-alpine
    container_name: eduhub_backend
    working_dir: /app
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh /app/docker-start.sh
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: eduhub_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduhub.ac.za
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - eduhub_pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  eduhub_pgdata:
    driver: local
  eduhub_pgadmin:
    driver: local
