services:
  db:
    image: postgres:16
    container_name: eduhub_db
    environment:
      POSTGRES_DB: eduhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - eduhub_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: eduhub_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eduhub.co.za
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - eduhub_pgadmin:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  eduhub_pgdata:
  eduhub_pgadmin:
