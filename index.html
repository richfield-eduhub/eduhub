<!DOCTYPE html>
<html>
<head>
  <title>EduHub</title>
  <!-- Make it mobile-friendly -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Simple styling -->
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f9f9f9;
    }

    h1 {
      color: #333;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #0073e6;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #005bb5;
    }
  </style>
</head>

<body>

<h1>Welcome to EduHub</h1>
<p>Student portal – login to access your courses and resources</p>

<button onclick="window.location.href='https://learning.eduhub.ac.za/login/index.php'">
  Student Login
</button>

</body>
</html>
