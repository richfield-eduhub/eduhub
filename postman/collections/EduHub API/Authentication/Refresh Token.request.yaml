$kind: http-request
url: "{{base_url}}/auth/refresh"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 200) {
          const jsonData = pm.response.json();
          pm.collectionVariables.set('access_token', jsonData.data.accessToken);
      }
    language: text/javascript
order: 4000
