$kind: http-request
name: Update Application Status (Admin)
method: PATCH
url: "{{base_url}}/admin/applications/:id/status"
headers:
  Authorization: Bearer {{access_token}}
  Content-Type: application/json
pathVariables:
  - key: id
    value: "{{application_id}}"
    description: Application UUID
body:
  type: json
  content: |-
    {
      "status": "under_review"
    }
order: 3000
