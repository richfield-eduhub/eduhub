$kind: http-request
method: GET
url: '{{base_url}}/campuses'
order: 1000
queryParams:
  - key: active_only
    value: 'true'
    description: Filter only active campuses
    disabled: true
  - key: include_online
    value: 'true'
    description: 'Include online campus (default: true)'
    disabled: true
