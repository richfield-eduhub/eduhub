$kind: http-request
method: PATCH
url: '{{base_url}}/lecturers/:id'
order: 6000
description: 'Update lecturer information. Admin only.'
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "department": "Computer Science",
      "title": "Dr",
      "campus_id": "campus_uuid_here"
    }
pathVariables:
  - key: id
    value: lecturer_uuid_here
