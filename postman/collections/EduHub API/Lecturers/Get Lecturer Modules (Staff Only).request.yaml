$kind: http-request
method: GET
url: '{{base_url}}/lecturers/:id/modules'
order: 5000
description: 'Get lecturer''s assigned modules by ID. Staff only.'
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
queryParams:
  - key: semester_id
    value: ''
    description: Filter by semester UUID
    disabled: true
  - key: active_only
    value: 'true'
    description: Filter only active modules
    disabled: true
pathVariables:
  - key: id
    value: lecturer_uuid_here
    description: Lecturer UUID
