$kind: http-request
method: GET
url: '{{base_url}}/lecturers'
order: 1000
description: 'Get all lecturers with pagination. Admin/Lecturer only.'
headers:
  - key: Authorization
    value: 'Bearer {{access_token}}'
queryParams:
  - key: page
    value: '1'
    description: Page number
    disabled: true
  - key: limit
    value: '20'
    description: Items per page (max 100)
    disabled: true
  - key: campus_id
    value: ''
    description: Filter by campus UUID
    disabled: true
  - key: search
    value: ''
    description: 'Search by name, email, or employee number'
    disabled: true
