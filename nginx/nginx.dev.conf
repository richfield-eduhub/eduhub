events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    upstream backend {
        server backend:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Max upload size
        client_max_body_size 10M;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # Liveness endpoint used by container and deploy health checks
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        # API proxy - forward all /api requests to backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Headers for proxying
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (if needed)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Frontend static files - handle HTML files
        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        # Specific handling for public routes
        location /public/ {
            try_files $uri $uri/ $uri.html =404;
        }

        # Specific handling for admin routes
        location /admin/ {
            try_files $uri $uri/ $uri.html =404;
        }

        # Specific handling for student routes
        location /student/ {
            try_files $uri $uri/ $uri.html =404;
        }

        # Specific handling for lecturer routes
        location /lecturer/ {
            try_files $uri $uri/ $uri.html =404;
        }

        # Cache static assets (CSS, JS, images)
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Custom error pages (optional)
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
