name: Build and Deploy EduHub

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci

      - name: Debug network
        run: |
          echo "Tailscale status:"
          tailscale status
          echo "Testing connection to server:"
          nc -zv ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT }} || echo "Connection failed"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eduhub-backend:latest

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eduhub-nginx:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          request_pty: true
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p ~/prod/eduhub
            cat > ~/prod/eduhub/docker-compose.yml << 'EOF'
            version: '3.8'
            services:
              db:
                image: postgres:16
                container_name: eduhub_db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: ${DB_NAME:-eduhub}
                  POSTGRES_USER: ${DB_USER:-postgres}
                  POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
                ports:
                  - "${DB_PORT:-5433}:5432"
                volumes:
                  - eduhub_pgdata:/var/lib/postgresql/data
                  - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                networks:
                  - eduhub_network
              pgadmin:
                image: dpage/pgadmin4
                container_name: eduhub_pgadmin
                restart: unless-stopped
                user: root
                environment:
                  PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eduhub.co.za}
                  PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
                  PGADMIN_CONFIG_SERVER_MODE: 'True'
                  PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
                ports:
                  - "${PGADMIN_PORT:-5050}:80"
                volumes:
                  - eduhub_pgadmin:/var/lib/pgadmin
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - eduhub_network
              backend:
                container_name: eduhub_backend
                restart: unless-stopped
                environment:
                  NODE_ENV: ${NODE_ENV:-production}
                  PORT: 3000
                  DB_HOST: db
                  DB_PORT: 5432
                  DB_NAME: ${DB_NAME:-eduhub}
                  DB_USER: ${DB_USER:-postgres}
                  DB_PASSWORD: ${DB_PASSWORD:-yourpassword}
                  JWT_SECRET: ${JWT_SECRET:-change_this}
                  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this}
                  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
                  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
                ports:
                  - "${BACKEND_PORT:-3000}:3000"
                volumes:
                  - ./logs/backend:/app/logs
                depends_on:
                  db:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                networks:
                  - eduhub_network
              nginx:
                container_name: eduhub_nginx
                restart: unless-stopped
                ports:
                  - "${NGINX_HTTP_PORT:-80}:80"
                  - "${NGINX_HTTPS_PORT:-443}:443"
                volumes:
                  - ./logs/nginx:/var/log/nginx
                depends_on:
                  backend:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
                  interval: 30s
                  timeout: 3s
                  retries: 3
                  start_period: 5s
                networks:
                  - eduhub_network
            volumes:
              eduhub_pgdata:
                driver: local
              eduhub_pgadmin:
                driver: local
            networks:
              eduhub_network:
                driver: bridge
            EOF
            cat > ~/prod/eduhub/docker-compose.prod.yml << 'EOF'
            version: '3.8'
            services:
              backend:
                image: ghcr.io/richfield-eduhub/eduhub-backend:latest
                environment:
                  NODE_ENV: production
              nginx:
                image: ghcr.io/richfield-eduhub/eduhub-nginx:latest
            EOF
