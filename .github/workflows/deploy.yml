name: Build and Deploy EduHub

on:
  push:
    branches:
      - main

jobs:
  # ─── Detect Changes ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            nginx:
              - 'nginx/**'
              - 'frontend/**'

  # ─── Build Backend ────────────────────────────────────────────────────────
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eduhub-backend:latest

  # ─── Build Nginx ──────────────────────────────────────────────────────────
  build-nginx:
    needs: changes
    if: needs.changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nginx/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/eduhub-nginx:latest

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    needs: [changes, build-backend, build-nginx]
    if: always() && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') && (needs.build-nginx.result == 'success' || needs.build-nginx.result == 'skipped') && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.nginx == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTH_KEY }}
          tags: tag:ci

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          request_pty: true
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/prod/eduhub

            # Write compose files and env
            cat > ~/prod/eduhub/docker-compose.yml << 'COMPOSEFILE'
            version: '3.8'
            services:
              db:
                image: postgres:16
                container_name: eduhub_db
                restart: unless-stopped
                environment:
                  POSTGRES_DB: ${DB_NAME:-eduhub}
                  POSTGRES_USER: ${DB_USER:-postgres}
                  POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
                ports:
                  - "${DB_PORT:-5433}:5432"
                volumes:
                  - eduhub_pgdata:/var/lib/postgresql/data
                  - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
                  interval: 5s
                  timeout: 5s
                  retries: 10
                networks:
                  - eduhub_network
              pgadmin:
                image: dpage/pgadmin4
                container_name: eduhub_pgadmin
                restart: unless-stopped
                user: root
                environment:
                  PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@eduhub.co.za}
                  PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
                  PGADMIN_CONFIG_SERVER_MODE: 'True'
                  PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
                ports:
                  - "${PGADMIN_PORT:-5050}:80"
                volumes:
                  - eduhub_pgadmin:/var/lib/pgadmin
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - eduhub_network
              backend:
                container_name: eduhub_backend
                restart: unless-stopped
                environment:
                  NODE_ENV: ${NODE_ENV:-production}
                  PORT: 3000
                  DB_HOST: db
                  DB_PORT: 5432
                  DB_NAME: ${DB_NAME:-eduhub}
                  DB_USER: ${DB_USER:-postgres}
                  DB_PASSWORD: ${DB_PASSWORD:-yourpassword}
                  JWT_SECRET: ${JWT_SECRET:-change_this}
                  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this}
                  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
                  JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
                ports:
                  - "${BACKEND_PORT:-3000}:3000"
                volumes:
                  - ./logs/backend:/app/logs
                depends_on:
                  db:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 40s
                networks:
                  - eduhub_network
              nginx:
                container_name: eduhub_nginx
                restart: unless-stopped
                ports:
                  - "${NGINX_HTTP_PORT:-80}:80"
                  - "${NGINX_HTTPS_PORT:-443}:443"
                volumes:
                  - ./logs/nginx:/var/log/nginx
                depends_on:
                  backend:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
                  interval: 30s
                  timeout: 3s
                  retries: 3
                  start_period: 5s
                networks:
                  - eduhub_network
            volumes:
              eduhub_pgdata:
                driver: local
              eduhub_pgadmin:
                driver: local
            networks:
              eduhub_network:
                driver: bridge
            COMPOSEFILE

            cat > ~/prod/eduhub/docker-compose.prod.yml << 'PRODFILE'
            version: '3.8'
            services:
              backend:
                image: ghcr.io/richfield-eduhub/eduhub-backend:latest
                environment:
                  NODE_ENV: production
              nginx:
                image: ghcr.io/richfield-eduhub/eduhub-nginx:latest
            PRODFILE

            cat > ~/prod/eduhub/.env << EOF
            DB_NAME=eduhub
            DB_USER=postgres
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_PORT=5433
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            PGADMIN_EMAIL=admin@eduhub.co.za
            PGADMIN_PASSWORD=${{ secrets.PGADMIN_PASSWORD }}
            NODE_ENV=production
            EOF

            # Login to GHCR
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Deploy only changed services with rollback
            CHANGED_BACKEND="${{ needs.changes.outputs.backend }}"
            CHANGED_NGINX="${{ needs.changes.outputs.nginx }}"

            deploy_service() {
              SERVICE=$1
              echo "Deploying $SERVICE..."
              
              # Pull new image
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull $SERVICE
              
              # Store current image as rollback point
              CURRENT_IMAGE=$(docker inspect --format='{{.Image}}' eduhub_${SERVICE} 2>/dev/null || echo "none")
              
              # Update only this service
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps $SERVICE
              
              # Wait for health check
              echo "Waiting for $SERVICE health check..."
              RETRIES=0
              MAX_RETRIES=5
              until [ $RETRIES -eq $MAX_RETRIES ] || [ "$(docker inspect --format='{{.State.Health.Status}}' eduhub_${SERVICE} 2>/dev/null)" = "healthy" ]; do
                sleep 5
                RETRIES=$((RETRIES+1))
                echo "Attempt $RETRIES/$MAX_RETRIES..."
              done
              
              if [ $RETRIES -eq $MAX_RETRIES ]; then
                echo "❌ $SERVICE failed health check — rolling back!"
                if [ "$CURRENT_IMAGE" != "none" ]; then
                  docker stop eduhub_${SERVICE}
                  docker run -d --name eduhub_${SERVICE}_rollback $CURRENT_IMAGE
                fi
                exit 1
              fi
              
              echo "✅ $SERVICE deployed successfully!"
            }

            if [ "$CHANGED_BACKEND" = "true" ]; then
              deploy_service "backend"
            fi

            if [ "$CHANGED_NGINX" = "true" ]; then
              deploy_service "nginx"
            fi

            docker system prune -f
