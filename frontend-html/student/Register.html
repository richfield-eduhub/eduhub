<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register Modules — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content" id="page-content">
    <div style="text-align:center;padding:60px"><div style="font-size:32px">⏳</div></div>
  </div>

  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('student');
    if (user) {
      await renderNavbar('register');
      render();
    }

    async function render() {
      const apps = await getApplications();
      const regs = await getRegistrations();
      const myApp = apps.find(a => a.studentId === user.studentId && a.status === 'approved');
      const myAllocs = regs.filter(r => r.studentId === user.studentId && r.status === 'allocated');
      const cont = document.getElementById('page-content');

      // No approved application
      if (!myApp) {
        cont.innerHTML = `
          <h1 class="section-title">MODULE REGISTRATION</h1>
          <div style="background:white;border-radius:12px;border:1px solid var(--rf-border);padding:48px 32px;text-align:center;max-width:560px;margin:0 auto">
            <div style="font-size:56px;margin-bottom:16px">⏳</div>
            <h2 style="color:var(--rf-navy);font-weight:800;margin-bottom:10px">Application Pending</h2>
            <p style="color:var(--rf-gray);font-size:15px;line-height:1.7">Your application is still being reviewed by the admissions team. Once approved, your modules will be allocated to you.</p>
            <div style="margin-top:24px;font-size:13px;color:#9ca3af">Questions? Contact <strong style="color:#123f7a">admissions@richfield.ac.za</strong></div>
          </div>`;
        return;
      }

      // Already has allocations
      if (myAllocs.length > 0) {
        const totalMods = myAllocs.reduce((s,r) => s + r.modules.length, 0);
        cont.innerHTML = `
          <h1 class="section-title">MODULE REGISTRATION</h1>
          <div style="background:white;border-radius:12px;border:1px solid var(--rf-border);padding:48px 32px;text-align:center;max-width:560px;margin:0 auto">
            <div style="font-size:56px;margin-bottom:16px">✅</div>
            <h2 style="color:#059669;font-weight:800;margin-bottom:10px">Modules Already Allocated</h2>
            <p style="color:var(--rf-gray);font-size:15px;line-height:1.7;margin-bottom:24px">
              Your modules have been allocated by the admissions office.
              You have <strong style="color:var(--rf-navy)">${totalMods} modules</strong> across ${myAllocs.length} semester${myAllocs.length>1?'s':''}.
            </p>
            <a href="/student/modules" style="display:inline-block;background:#123f7a;color:white;padding:12px 28px;border-radius:8px;font-weight:700;font-size:15px;text-decoration:none">View My Modules →</a>
          </div>`;
        return;
      }

      // Approved but no modules yet — waiting state (matches React exactly)
      cont.innerHTML = `
        <h1 class="section-title">MODULE REGISTRATION</h1>

        <div style="background:linear-gradient(135deg,var(--rf-navy),#123f7a);color:white;border-radius:12px;padding:24px 28px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
          <div>
            <div style="font-size:11px;opacity:.6;letter-spacing:1px;margin-bottom:4px">ENROLLED IN</div>
            <div style="font-weight:800;font-size:20px">${myApp.qualificationName}</div>
            <div style="font-size:13px;opacity:.75;margin-top:3px">Student ID: <span style="font-family:monospace;font-weight:700">${myApp.studentId}</span></div>
          </div>
          <div style="background:rgba(255,255,255,.15);border-radius:8px;padding:10px 18px;text-align:center">
            <div style="font-size:12px;opacity:.7">STUDY YEAR</div>
            <div style="font-weight:900;font-size:26px">Year ${myApp.studyYear}</div>
          </div>
        </div>

        <div style="background:white;border-radius:12px;border:2px dashed #C7D2FE;padding:56px 32px;text-align:center;max-width:600px;margin:0 auto">
          <div style="position:relative;width:80px;height:80px;margin:0 auto 24px">
            <div style="position:absolute;inset:0;border-radius:50%;border:4px solid #EEF2FF"></div>
            <div style="position:absolute;inset:0;border-radius:50%;border:4px solid transparent;border-top-color:#123f7a;animation:spin 1.2s linear infinite"></div>
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px">📚</div>
          </div>

          <h2 style="color:var(--rf-navy);font-weight:800;font-size:22px;margin-bottom:12px">Waiting for Module Allocation</h2>
          <p style="color:var(--rf-gray);font-size:15px;line-height:1.8;max-width:420px;margin:0 auto 24px">
            Your application has been <strong style="color:#059669">approved</strong> — great news!
            The admissions office is preparing your module schedule for <strong style="color:var(--rf-navy)">Year ${myApp.studyYear}</strong>.
            You'll receive a notification as soon as your modules are ready.
          </p>

          <!-- Progress steps -->
          <div style="display:flex;gap:0;justify-content:center;margin-bottom:28px">
            ${[
              {icon:'📝',label:'Applied',done:true},
              {icon:'✅',label:'Approved',done:true},
              {icon:'📚',label:'Modules Allocated',done:false,active:true},
              {icon:'🎓',label:'Classes Begin',done:false},
            ].map((s,i) => `
              <div style="display:flex;align-items:center">
                <div style="display:flex;flex-direction:column;align-items:center;gap:6px;width:80px">
                  <div style="width:40px;height:40px;border-radius:50%;background:${s.done?'#059669':s.active?'#123f7a':'#e5e7eb'};color:${s.done||s.active?'white':'#9ca3af'};display:flex;align-items:center;justify-content:center;font-size:${s.done?16:18}px;border:${s.active?'3px solid #ffc72c':'none'}">
                    ${s.done?'✓':s.icon}
                  </div>
                  <div style="font-size:11px;font-weight:600;color:${s.done?'#059669':s.active?'#123f7a':'#9ca3af'};text-align:center;line-height:1.3">${s.label}</div>
                </div>
                ${i<3?`<div style="width:20px;height:2px;background:${s.done?'#059669':'#e5e7eb'};margin-bottom:20px;flex-shrink:0"></div>`:''}
              </div>`).join('')}
          </div>

          <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 18px;font-size:14px;color:#3730a3;display:inline-block;text-align:left;max-width:380px">
            🔔 <strong>Tip:</strong> Check the notification bell (🔔) in the top navbar — you'll see an alert the moment your modules are allocated.
          </div>

          <div style="margin-top:20px;font-size:13px;color:#9ca3af">
            Need help? Contact <strong style="color:#123f7a">admissions@richfield.ac.za</strong> · <strong style="color:#123f7a">0860 742 434</strong>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
