<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Course Catalogue — EduHub</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    .course-card{background:white;border-radius:12px;border:1px solid var(--rf-border);overflow:hidden;transition:transform .2s,box-shadow .2s}
    .course-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(18,63,122,.12)}
    .filter-btn{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--rf-border);background:white;color:var(--rf-navy);transition:all .15s}
    .filter-btn.active{background:var(--rf-blue);color:white;border-color:var(--rf-blue)}
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content">
  <h1 class="section-title">COURSE CATALOGUE</h1>
  <p class="section-subtitle">Browse all available qualifications offered by EduHub</p>

  <div style="display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap" id="filters">
    <button class="filter-btn active" onclick="filterBy('all',this)">All Courses</button>
    <button class="filter-btn" onclick="filterBy('it',this)">Information Technology</button>
    <button class="filter-btn" onclick="filterBy('business',this)">Business &amp; Management</button>
  </div>

  <div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px"></div>
</div>

<!-- Course detail modal -->
<div id="course-modal" class="modal-overlay hidden">
  <div class="modal modal-lg" style="max-height:90vh;overflow-y:auto">
    <div class="modal-header" id="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal('course-modal')">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('course-modal')">Close</button>
      <a href="Apply.html" class="btn btn-gold" style="text-decoration:none">Apply for This Course</a>
    </div>
  </div>
</div>

<script src="../shared-local.js"></script>
<script>
requireAuth('student');
renderNavbar('student-courses');

// Map courses to categories based on faculty
const PALETTE = ['#003DA5','#0369a1','#0891b2','#7c3aed','#be185d','#1e6b3c','#b45309','#155e75','#6d28d9','#0f766e','#92400e','#5b21b6','#065f46','#374151','#1e1b4b','#4338ca'];
const COLORS  = Object.fromEntries(QUALIFICATIONS.map((q, i) => [q.code, PALETTE[i % PALETTE.length]]));
const CAT_MAP = Object.fromEntries(QUALIFICATIONS.map(q => [
  q.code,
  q.faculty.toLowerCase().includes('information') ? 'it' : 'business'
]));
let current = 'all';

function filterBy(cat, btn) {
  current = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = current === 'all' ? QUALIFICATIONS : QUALIFICATIONS.filter(q => CAT_MAP[q.code] === current);
  document.getElementById('grid').innerHTML = list.map(q => `
    <div class="course-card">
      <div style="background:${COLORS[q.code]||'#123f7a'};padding:20px 22px;color:white">
        <div style="font-size:11px;opacity:.65;letter-spacing:1px;margin-bottom:6px">${q.faculty.toUpperCase()}</div>
        <div style="font-weight:800;font-size:17px;line-height:1.3">${q.name}</div>
        <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
          <span style="background:rgba(255,255,255,.18);padding:3px 10px;border-radius:99px;font-size:12px">${q.duration}</span>
          <span style="background:rgba(255,255,255,.18);padding:3px 10px;border-radius:99px;font-size:12px">${q.modules.length} modules</span>
        </div>
      </div>
      <div style="padding:18px 22px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div>
            <div style="font-size:11px;color:var(--rf-gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Annual Fee</div>
            <div style="font-size:22px;font-weight:900;color:var(--rf-navy)">R${q.fee.toLocaleString()}</div>
          </div>
          <span style="background:#EEF2FF;color:#3730a3;font-size:12px;font-weight:700;padding:4px 10px;border-radius:99px">${q.code}</span>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="openCourse('${q.code}')" class="btn btn-secondary btn-sm" style="flex:1">View Modules</button>
          <a href="../public/Apply.html" class="btn btn-gold btn-sm" style="flex:1;text-decoration:none;justify-content:center">Apply Now</a>
        </div>
      </div>
    </div>`).join('');
}

function openCourse(code) {
  const q = QUALIFICATIONS.find(x => x.code === code);
  if (!q) return;
  document.getElementById('modal-title').textContent = q.name;
  document.getElementById('modal-header').style.background = COLORS[q.code] || '#123f7a';
  document.getElementById('modal-header').style.color = 'white';
  document.getElementById('modal-header').querySelector('.modal-close').style.color = 'white';
  // Group modules by year
  const byYear = {};
  q.modules.forEach(m => { if (!byYear[m.year]) byYear[m.year] = []; byYear[m.year].push(m); });
  document.getElementById('modal-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">
      ${[['Faculty',q.faculty],['Duration',q.duration],['Annual Fee','R'+q.fee.toLocaleString()]].map(([k,v])=>`
      <div style="background:var(--rf-offwhite);padding:12px;border-radius:8px">
        <div style="font-size:11px;color:var(--rf-gray);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${k}</div>
        <div style="font-weight:700;font-size:14px">${v}</div>
      </div>`).join('')}
    </div>
    ${Object.entries(byYear).map(([yr,mods]) => `
    <div style="margin-bottom:16px">
      <div style="font-weight:800;font-size:14px;color:${COLORS[q.code]||'#123f7a'};margin-bottom:8px;display:flex;align-items:center;gap:8px">
        <span style="background:${COLORS[q.code]||'#123f7a'};color:white;padding:2px 10px;border-radius:99px;font-size:12px">Year ${yr}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${mods.map(m=>`<div style="background:var(--rf-offwhite);border-radius:6px;padding:10px 12px;border-left:3px solid ${m.semester===1?'#3b82f6':'#8b5cf6'}">
          <div style="font-weight:600;font-size:13px">${m.name}</div>
          <div style="font-size:11px;color:var(--rf-gray);margin-top:2px">${m.code} · Sem ${m.semester} · ${m.credits} credits</div>
        </div>`).join('')}
      </div>
    </div>`).join('')}`;
  openModal('course-modal');
}

render();
</script>
</body>
</html>
