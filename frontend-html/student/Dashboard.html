<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Student Dashboard — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content">
  <!-- Welcome banner -->
  <div id="welcome-banner" style="background:linear-gradient(135deg,var(--rf-navy) 0%,var(--rf-blue) 100%);border-radius:var(--radius-lg);padding:28px 32px;color:white;margin-bottom:24px;position:relative;overflow:hidden">
    <div style="position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04)"></div>
    <div style="position:relative;z-index:1">
      <div style="font-size:13px;opacity:.7;margin-bottom:6px;letter-spacing:1px">STUDENT PORTAL</div>
      <h1 id="welcome-name" style="font-family:var(--font-display);font-size:32px;letter-spacing:1px;margin-bottom:6px"></h1>
      <div id="welcome-meta" style="display:flex;gap:20px;font-size:13px;opacity:.85;flex-wrap:wrap"></div>
    </div>
  </div>
  <div id="temp-pwd-alert"></div>
  <div class="grid-2 mb-24">
    <div class="card"><div class="card-header"><span style="font-weight:700">Application Status</span></div><div class="card-body" id="app-status"></div></div>
    <div class="card"><div class="card-header"><span style="font-weight:700">Module Allocation</span><a id="view-mods-link" href="Modules.html" class="btn btn-sm btn-primary" style="display:none">View Modules →</a></div><div class="card-body" id="module-status"></div></div>
  </div>
  <div class="card">
    <div class="card-header"><span style="font-weight:700">Notifications</span></div>
    <div style="max-height:320px;overflow-y:auto" id="notif-list"></div>
  </div>
</div>

<!-- Change password modal -->
<div id="pwd-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <div class="modal-title">Change Password</div>
      <button class="modal-close" onclick="closeModal('pwd-modal')">×</button>
    </div>
    <div class="modal-body">
      <div id="pwd-alert"></div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">New Password (min 8 characters)</label>
        <input type="password" id="new-pwd" class="form-input" placeholder="Enter new password"/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirm-pwd" class="form-input" placeholder="Confirm new password"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('pwd-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmPwdChange()">Change Password</button>
    </div>
  </div>
</div>

<script src="../shared-local.js"></script>
<script>
const user=requireAuth('student');
renderNavbar('student-dashboard');

const apps=getApplications();
const regs=getRegistrations();
const myApp=apps.find(a=>a.studentId===user.studentId&&a.status==='approved');
const myRegs=regs.filter(r=>r.studentId===user.studentId);
const myNotifs=getUserNotifs(user);
const hasAlloc=myRegs.some(r=>r.status==='allocated');

document.getElementById('welcome-name').textContent=`WELCOME, ${user.name.split(' ')[0].toUpperCase()}!`;
document.getElementById('welcome-meta').innerHTML=`
  <span>🆔 ${user.studentId||''}</span>
  ${myApp?`<span>📚 ${myApp.qualificationName}</span>`:''}
  ${user.tempPassword?`<span onclick="openModal('pwd-modal')" style="cursor:pointer;background:rgba(245,166,35,.3);border:1px solid rgba(245,166,35,.5);padding:2px 10px;border-radius:99px;color:var(--rf-gold);font-weight:700">⚠ Change temporary password</span>`:''}`;

if(user.tempPassword){
  document.getElementById('temp-pwd-alert').innerHTML=`<div class="alert alert-warning" style="margin-bottom:20px"><span>🔑</span><div><strong>Action Required:</strong> You are using a temporary password. Please <button onclick="openModal('pwd-modal')" style="background:none;border:none;color:var(--rf-blue);font-weight:700;cursor:pointer;text-decoration:underline">change your password now</button>.</div></div>`;
}

// Application status
document.getElementById('app-status').innerHTML=myApp?`
  <span class="badge badge-approved" style="margin-bottom:12px">✓ Approved</span>
  <div style="display:flex;flex-direction:column;gap:8px">
    ${[['Qualification',myApp.qualificationName],['Code',myApp.qualificationCode],['Applied',fmtDate(myApp.submittedAt)]].map(([k,v])=>`
    <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--rf-gray)">${k}</span><span style="font-weight:600">${v}</span></div>`).join('')}
  </div>`:
  `<div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-size:14px">No approved application yet</div></div>`;

// Module allocation status
if(hasAlloc){
  document.getElementById('view-mods-link').style.display='';
  document.getElementById('module-status').innerHTML=`
    <span class="badge badge-approved" style="margin-bottom:12px">✅ Modules Allocated</span>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${myRegs.filter(r=>r.status==='allocated').map(r=>`<div style="font-size:13px"><strong>${r.modules.length}</strong> modules · Year ${r.studyYear}, Sem ${r.semester}</div>`).join('')}
      <a href="Modules.html" style="font-size:13px;color:var(--rf-blue);font-weight:600;margin-top:4px">View my modules →</a>
    </div>`;
}else if(myApp){
  document.getElementById('module-status').innerHTML=`<div style="text-align:center;padding:20px 0"><div style="font-size:32px;margin-bottom:8px">⏳</div><div style="font-size:14px;font-weight:600;color:#001A4D;margin-bottom:4px">Awaiting Module Allocation</div><div style="font-size:13px;color:var(--rf-gray);line-height:1.6">Your application is approved. The admissions office will assign your modules shortly.</div></div>`;
}else{
  document.getElementById('module-status').innerHTML=`<div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-size:14px">Modules will be allocated once your application is approved</div></div>`;
}

// Notifications
document.getElementById('notif-list').innerHTML=myNotifs.length===0
  ?'<div style="padding:32px;text-align:center;color:var(--rf-gray);font-size:14px">No notifications yet</div>'
  :myNotifs.map(n=>`<div style="padding:14px 20px;border-bottom:1px solid var(--rf-border);background:${n.read?'white':'#EEF2FF'}">
    <div style="display:flex;gap:10px;align-items:flex-start">
      <span style="font-size:18px">${n.type==='success'?'✅':n.type==='error'?'❌':n.type==='warning'?'⚠️':'ℹ️'}</span>
      <div><div style="font-weight:700;font-size:14px">${n.title}</div>
        <div style="font-size:13px;color:var(--rf-gray);margin-top:2px;line-height:1.6">${n.message}</div>
        <div style="font-size:11px;color:#9CA3AF;margin-top:4px">${fmtDateTime(n.createdAt)}</div>
      </div>
    </div>
  </div>`).join('');

function confirmPwdChange(){
  const p=document.getElementById('new-pwd').value;
  const c=document.getElementById('confirm-pwd').value;
  if(!p||p.length<8)return showAlert('pwd-alert','Password must be at least 8 characters.','error');
  if(p!==c)return showAlert('pwd-alert','Passwords do not match.','error');
  doChangePassword(user.id,p);
  closeModal('pwd-modal');
  showToast('Password changed successfully!','success');
  // reload to update temp password warning
  setTimeout(()=>location.reload(),1000);
}
</script>
</body>
</html>
