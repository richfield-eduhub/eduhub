<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Student Dashboard — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content">
    <!-- Welcome Banner -->
    <div style="background:linear-gradient(135deg,var(--rf-navy) 0%,var(--rf-blue) 100%);border-radius:var(--radius-lg);padding:28px 32px;color:white;margin-bottom:24px;position:relative;overflow:hidden">
      <div style="position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04)"></div>
      <div style="position:relative;z-index:1">
        <div style="font-size:13px;opacity:.7;margin-bottom:6px;letter-spacing:1px">STUDENT PORTAL</div>
        <h1 id="welcome-name" style="font-family:var(--font-display);font-size:32px;letter-spacing:1px;margin-bottom:6px">WELCOME!</h1>
        <div style="display:flex;gap:20px;font-size:13px;opacity:.85;flex-wrap:wrap" id="welcome-meta"></div>
      </div>
    </div>
    <div id="temp-pwd-alert" style="display:none" class="alert alert-warning mb-24">
      <span>🔑</span>
      <div><strong>Action Required:</strong> You are using a temporary password.
        <button onclick="openModal('pwd-modal')" style="background:none;border:none;color:var(--rf-blue);font-weight:700;cursor:pointer;text-decoration:underline">Change it now</button>.
      </div>
    </div>
    <div class="grid-2 mb-24">
      <div class="card">
        <div class="card-header"><span class="card-title">Application Status</span></div>
        <div class="card-body" id="app-status-body"><div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px">⏳</div></div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Module Allocation</span>
          <a id="view-modules-btn" href="/student/modules" class="btn btn-sm btn-primary" style="display:none">View Modules →</a>
        </div>
        <div class="card-body" id="allocation-body"><div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px">⏳</div></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Notifications</span></div>
      <div id="notifs-list" style="max-height:320px;overflow-y:auto">
        <div style="padding:32px;text-align:center;color:var(--rf-gray);font-size:14px">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div id="pwd-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Change Password</span><button class="modal-close" onclick="closeModal('pwd-modal')">×</button></div>
      <div class="modal-body">
        <div id="pwd-alert"></div>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="form-group"><label class="form-label">Current Password <span class="required">*</span></label><input type="password" id="cur-pwd" class="form-input" placeholder="Your current password"></div>
          <div class="form-group"><label class="form-label">New Password <span class="required">*</span></label><input type="password" id="new-pwd" class="form-input" placeholder="Minimum 8 characters"></div>
          <div class="form-group"><label class="form-label">Confirm New Password <span class="required">*</span></label><input type="password" id="conf-pwd" class="form-input" placeholder="Repeat new password"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('pwd-modal')">Cancel</button>
        <button id="save-pwd-btn" class="btn btn-primary" onclick="submitPasswordChange()">Update Password</button>
      </div>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('student');
    if (user) { (async()=>{ await renderNavbar('dashboard'); await init(); })(); }

    async function init() {
      document.getElementById('welcome-name').textContent = `WELCOME, ${user.name.split(' ')[0].toUpperCase()}!`;
      const meta = [];
      if (user.studentId) meta.push(`<span>🆔 ${user.studentId}</span>`);
      if (user.tempPassword) {
        meta.push(`<span onclick="openModal('pwd-modal')" style="cursor:pointer;background:rgba(245,166,35,.3);border:1px solid rgba(245,166,35,.5);padding:2px 10px;border-radius:99px;color:var(--rf-gold);font-weight:700">⚠ Change temporary password</span>`);
        document.getElementById('temp-pwd-alert').style.display = 'flex';
      }

      // Load applications + registrations in parallel
      const [apps, regs, notifs] = await Promise.all([
        getApplications(),
        getRegistrations(),
        getNotifications(),
      ]);

      const myApp = apps.find(a => a.status === 'approved');
      if (myApp) meta.push(`<span>📚 ${myApp.qualificationName}</span>`);
      document.getElementById('welcome-meta').innerHTML = meta.join('');

      // Application status card
      const appBody = document.getElementById('app-status-body');
      if (myApp) {
        appBody.innerHTML = `
          <span class="badge badge-approved" style="margin-bottom:12px">✓ Approved</span>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${[['Qualification',myApp.qualificationName],['Code',myApp.qualificationCode],['Applied',fmtDate(myApp.submittedAt)]].map(([k,v])=>`
            <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--rf-gray)">${k}</span><span style="font-weight:600">${v}</span></div>`).join('')}
          </div>`;
      } else if (apps.length) {
        appBody.innerHTML = `${badge(apps[0].status)}<div style="margin-top:12px;font-size:13px;color:var(--rf-gray)">${apps[0].qualificationName||'Application under review'}</div>`;
      } else {
        appBody.innerHTML = `<div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-size:14px">No approved application yet</div></div>`;
      }

      // Module allocation card
      const allocated = regs.filter(r => r.status === 'allocated');
      const allocBody = document.getElementById('allocation-body');
      if (allocated.length > 0) {
        document.getElementById('view-modules-btn').style.display = 'inline-flex';
        allocBody.innerHTML = `
          <span class="badge badge-approved" style="margin-bottom:12px">✅ Modules Allocated</span>
          <div style="display:flex;flex-direction:column;gap:6px">
            ${allocated.map(r=>`<div style="font-size:13px"><strong>${r.modules.length}</strong> modules · Year ${r.studyYear}, Sem ${r.semester}</div>`).join('')}
            <a href="/student/modules" style="font-size:13px;color:var(--rf-blue);font-weight:600;margin-top:4px">View my modules →</a>
          </div>`;
      } else if (myApp) {
        allocBody.innerHTML = `<div style="text-align:center;padding:20px 0"><div style="font-size:32px;margin-bottom:8px">⏳</div><div style="font-size:14px;font-weight:600;color:var(--rf-navy);margin-bottom:4px">Awaiting Module Allocation</div><div style="font-size:13px;color:var(--rf-gray);line-height:1.6">The admissions office will assign your modules shortly.</div></div>`;
      } else {
        allocBody.innerHTML = `<div style="text-align:center;color:var(--rf-gray);padding:20px 0"><div style="font-size:32px;margin-bottom:8px">📋</div><div style="font-size:14px">Modules will be allocated once your application is approved</div></div>`;
      }

      // Notifications
      const notifList = document.getElementById('notifs-list');
      if (notifs.length === 0) {
        notifList.innerHTML = '<div style="padding:32px;text-align:center;color:var(--rf-gray);font-size:14px">No notifications yet</div>';
      } else {
        notifList.innerHTML = notifs.map(n => `
          <div style="padding:14px 20px;border-bottom:1px solid var(--rf-border);background:${n.read?'white':'#EEF2FF'}">
            <div style="display:flex;gap:10px;align-items:flex-start">
              <span style="font-size:18px">${n.type==='success'?'✅':n.type==='error'?'❌':n.type==='warning'?'⚠️':'ℹ️'}</span>
              <div>
                <div style="font-weight:700;font-size:14px">${n.title}</div>
                <div style="font-size:13px;color:var(--rf-gray);margin-top:2px;line-height:1.6">${n.message}</div>
                <div style="font-size:11px;color:#9CA3AF;margin-top:4px">${fmtDate(n.createdAt)}</div>
              </div>
            </div>
          </div>`).join('');
      }
    }

    async function submitPasswordChange() {
      clearAlert('pwd-alert');
      const cur  = document.getElementById('cur-pwd').value;
      const np   = document.getElementById('new-pwd').value;
      const conf = document.getElementById('conf-pwd').value;
      if (!cur)         return showAlert('pwd-alert', 'Enter your current password.', 'error');
      if (np.length < 8) return showAlert('pwd-alert', 'New password must be at least 8 characters.', 'error');
      if (np !== conf)  return showAlert('pwd-alert', 'Passwords do not match.', 'error');
      setLoading('save-pwd-btn', true, 'Saving...');
      const res = await changePassword(cur, np);
      setLoading('save-pwd-btn', false, 'Update Password');
      if (!res.ok) return showAlert('pwd-alert', res.message || 'Failed to change password.', 'error');
      closeModal('pwd-modal');
      document.getElementById('temp-pwd-alert').style.display = 'none';
      showToast('Password changed successfully! ✅', 'success');
    }
  </script>
</body>
</html>
