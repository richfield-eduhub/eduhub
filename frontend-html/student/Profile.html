<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Profile — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    .avatar-ring{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--rf-navy),var(--rf-blue));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:white;flex-shrink:0;position:relative;overflow:hidden}
    .avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content" style="max-width:760px">
  <h1 class="section-title">MY PROFILE</h1>
  <p class="section-subtitle">Manage your personal details and account settings</p>

  <!-- Profile header card -->
  <div class="card mb-24" style="margin-bottom:20px">
    <div class="card-body" style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div class="avatar-ring" id="avatar-display">
        <span id="avatar-initials"></span>
        <img id="avatar-img" style="display:none"/>
      </div>
      <div style="flex:1">
        <div id="profile-name" style="font-weight:800;font-size:20px;color:var(--rf-navy)"></div>
        <div id="profile-meta" style="font-size:14px;color:var(--rf-gray);margin-top:4px"></div>
      </div>
      <label class="btn btn-secondary btn-sm" style="cursor:pointer">
        📷 Change Photo
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)"/>
      </label>
    </div>
  </div>

  <!-- Profile form -->
  <div class="card mb-24" style="margin-bottom:20px">
    <div class="card-header"><span style="font-weight:700;font-size:15px">Personal Information</span></div>
    <div class="card-body">
      <div id="profile-alert"></div>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group"><label class="form-label">First Name</label><input id="firstName" class="form-input"/></div>
        <div class="form-group"><label class="form-label">Last Name</label><input id="lastName" class="form-input"/></div>
      </div>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group"><label class="form-label">Email Address</label><input type="email" id="email" class="form-input"/></div>
        <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" id="phone" class="form-input" placeholder="+27 XX XXX XXXX"/></div>
      </div>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" id="dob" class="form-input"/></div>
        <div class="form-group"><label class="form-label">Residential Address</label><input id="address" class="form-input" placeholder="Street, Suburb, City"/></div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>

  <!-- Change password -->
  <div class="card">
    <div class="card-header"><span style="font-weight:700;font-size:15px">Change Password</span></div>
    <div class="card-body">
      <div id="pwd-alert"></div>
      <div style="display:flex;flex-direction:column;gap:14px;max-width:400px">
        <div class="form-group"><label class="form-label">New Password</label><input type="password" id="new-pwd" class="form-input" placeholder="Min 8 characters"/></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input type="password" id="confirm-pwd" class="form-input" placeholder="Repeat new password"/></div>
        <button class="btn btn-secondary" onclick="savePwd()">Update Password</button>
      </div>
    </div>
  </div>
</div>

<script src="../shared-local.js"></script>
<script>
const user = requireAuth('student');
renderNavbar('student-profile');

function renderProfile() {
  const u = getCurrentUser();
  document.getElementById('profile-name').textContent = u.name;
  document.getElementById('profile-meta').textContent = `${u.email}  ·  ${u.role}  ·  ID: ${u.studentId||'—'}`;
  document.getElementById('avatar-initials').textContent = u.name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
  if (u.avatarUrl) {
    document.getElementById('avatar-img').src = u.avatarUrl;
    document.getElementById('avatar-img').style.display = '';
    document.getElementById('avatar-initials').style.display = 'none';
  }
  document.getElementById('firstName').value  = u.firstName || u.name.split(' ')[0] || '';
  document.getElementById('lastName').value   = u.lastName  || u.name.split(' ').slice(1).join(' ') || '';
  document.getElementById('email').value      = u.email || '';
  document.getElementById('phone').value      = u.phone || '';
  document.getElementById('dob').value        = u.dateOfBirth || '';
  document.getElementById('address').value    = u.address || '';
}

function saveProfile() {
  clearAlert('profile-alert');
  const patch = {
    firstName:   document.getElementById('firstName').value.trim(),
    lastName:    document.getElementById('lastName').value.trim(),
    phone:       document.getElementById('phone').value.trim(),
    dateOfBirth: document.getElementById('dob').value,
    address:     document.getElementById('address').value.trim(),
  };
  const result = updateProfile(user.id, patch);
  if (result.success) { showToast('Profile updated!', 'success'); renderProfile(); }
  else showAlert('profile-alert', result.message, 'error');
}

function savePwd() {
  clearAlert('pwd-alert');
  const p = document.getElementById('new-pwd').value;
  const c = document.getElementById('confirm-pwd').value;
  if (!p || p.length < 8) return showAlert('pwd-alert', 'Password must be at least 8 characters.', 'error');
  if (p !== c) return showAlert('pwd-alert', 'Passwords do not match.', 'error');
  doChangePassword(user.id, p);
  document.getElementById('new-pwd').value = '';
  document.getElementById('confirm-pwd').value = '';
  showToast('Password changed successfully!', 'success');
}

function handleAvatarUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    uploadAvatar(user.id, e.target.result);
    showToast('Photo updated!', 'success');
    renderProfile();
  };
  reader.readAsDataURL(file);
}

renderProfile();
</script>
</body>
</html>
