<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Modules — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content" id="page-content">
    <div style="text-align:center;padding:60px"><div style="font-size:32px">⏳</div><div style="color:var(--rf-gray);margin-top:8px">Loading your modules...</div></div>
  </div>
  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('student');
    if (user) { (async()=>{ await renderNavbar('modules'); await init(); })(); }

    async function init() {
      const [apps, regs] = await Promise.all([getApplications(), getRegistrations()]);
      const myApp = apps.find(a => a.status === 'approved');
      const qual  = myApp ? QUALIFICATIONS.find(q => q.code === myApp.qualificationCode) : null;
      const allActive = regs.filter(r => r.status === 'allocated').sort((a,b) => a.studyYear!==b.studyYear ? a.studyYear-b.studyYear : a.semester-b.semester);
      const cont = document.getElementById('page-content');

      if (!myApp) {
        cont.innerHTML = `<h1 class="section-title">MY MODULES</h1><div class="alert alert-warning"><span>⏳</span><div>Your application is still being reviewed. Modules will show here once approved.</div></div>`;
        return;
      }
      if (allActive.length === 0) {
        cont.innerHTML = `<h1 class="section-title">MY MODULES</h1>
          <div style="background:linear-gradient(135deg,var(--rf-navy),#123f7a);color:white;border-radius:12px;padding:28px 32px;margin-bottom:24px">
            <div style="font-size:13px;opacity:.7;margin-bottom:6px">ENROLLED IN</div>
            <div style="font-weight:800;font-size:22px;margin-bottom:4px">${myApp.qualificationName}</div>
            <div style="font-size:13px;opacity:.75">${qual?.faculty||''} · ${qual?.duration||''}</div>
          </div>
          <div style="text-align:center;padding:52px 20px;background:white;border-radius:12px;border:1px solid var(--rf-border)">
            <div style="font-size:52px;margin-bottom:16px">📭</div>
            <div style="font-size:18px;font-weight:700;color:var(--rf-navy);margin-bottom:8px">No modules allocated yet</div>
            <div style="font-size:14px;color:var(--rf-gray);max-width:380px;margin:0 auto;line-height:1.6">The admissions office will allocate your modules and you'll receive a notification once they're ready.</div>
          </div>`;
        return;
      }

      const totalModules = allActive.reduce((s,r) => s+r.modules.length, 0);
      const totalCredits = allActive.reduce((s,r) => r.modules.reduce((ms,m) => ms+m.credits, s), 0);

      cont.innerHTML = `
        <h1 class="section-title">MY MODULES</h1>
        <p class="section-subtitle">Modules allocated by the admissions office</p>
        <div style="background:linear-gradient(135deg,var(--rf-navy),#123f7a);color:white;border-radius:12px;padding:24px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
          <div>
            <div style="font-size:12px;opacity:.65;margin-bottom:4px;letter-spacing:1px">ENROLLED IN</div>
            <div style="font-weight:800;font-size:20px">${myApp.qualificationName}</div>
            <div style="font-size:13px;opacity:.75;margin-top:4px">${qual?.faculty||''} · ${qual?.duration||''}</div>
          </div>
          <div style="display:flex;gap:20px;text-align:center">
            <div><div style="font-size:24px">📚</div><div style="font-weight:900;font-size:26px">${totalModules}</div><div style="font-size:11px;opacity:.7">Total Modules</div></div>
            <div><div style="font-size:24px">⭐</div><div style="font-weight:900;font-size:26px">${totalCredits}</div><div style="font-size:11px;opacity:.7">Total Credits</div></div>
          </div>
        </div>
        ${allActive.map(reg => `
          <div style="background:white;border-radius:12px;border:1px solid var(--rf-border);margin-bottom:20px;overflow:hidden;box-shadow:var(--shadow-sm)">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:2px solid var(--rf-border);background:var(--rf-offwhite)">
              <div>
                <div style="font-weight:800;font-size:16px;color:var(--rf-navy)">Year ${reg.studyYear} — Semester ${reg.semester}</div>
                <div style="font-size:13px;color:var(--rf-gray);margin-top:2px">${reg.year} Academic Year · ${reg.modules.length} modules · ${reg.modules.reduce((s,m)=>s+m.credits,0)} credits</div>
              </div>
              <span style="font-size:12px;font-weight:700;padding:4px 12px;border-radius:99px;background:#D1FAE5;color:#065f46">✅ Allocated</span>
            </div>
            <div style="padding:16px 20px;display:flex;flex-direction:column;gap:10px">
              ${reg.modules.map((m,i) => `
                <div style="display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--rf-offwhite);border-radius:8px;border:1px solid var(--rf-border)">
                  <div style="width:32px;height:32px;background:#123f7a;border-radius:8px;color:white;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
                  <div style="flex:1">
                    <div style="font-weight:600;font-size:14px;color:var(--rf-navy)">${m.name}</div>
                    <div style="font-size:12px;color:var(--rf-gray);font-family:var(--font-mono);margin-top:2px">${m.code}</div>
                  </div>
                  <div style="text-align:right;flex-shrink:0">
                    <div style="font-weight:700;font-size:15px;color:#123f7a">${m.credits}</div>
                    <div style="font-size:11px;color:var(--rf-gray)">credits</div>
                  </div>
                </div>`).join('')}
            </div>
            <div style="padding:14px 20px;border-top:1px solid var(--rf-border);background:var(--rf-offwhite);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
              <div style="font-size:14px;color:#374151">Semester Fee: <strong style="color:var(--rf-navy)">R${reg.totalFee.toLocaleString()}</strong></div>
              <span style="font-size:13px;font-weight:700;padding:4px 12px;border-radius:99px;background:${reg.feePaid?'#D1FAE5':'#FEE2E2'};color:${reg.feePaid?'#065f46':'#dc2626'}">${reg.feePaid?'✓ Fee Paid':'✗ Fee Outstanding'}</span>
            </div>
          </div>`).join('')}
        <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:14px 18px;font-size:14px;color:#3730a3">
          📞 For queries, contact <strong>admissions@richfield.ac.za</strong> or call <strong>0860 742 434</strong>.
        </div>`;
    }
  </script>
</body>
</html>
