<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lecturer Dashboard — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content">
  <h1 class="section-title">LECTURER PORTAL</h1>
  <p class="section-subtitle" id="subtitle"></p>
  <div class="grid-3 mb-24" id="stats"></div>
  <div class="card">
    <div class="card-header"><span style="font-weight:700">Enrolled Students by Programme</span></div>
    <div id="table-wrap"></div>
  </div>
</div>
<script src="../shared-local.js"></script>
<script>
const user=requireAuth('lecturer');
renderNavbar('lecturer');

const regs=getRegistrations();
const users=getUsers();
const approvedRegs=regs.filter(r=>r.status==='approved'||r.status==='allocated');
const students=users.filter(u=>u.role==='student');
const progCount=new Set(approvedRegs.map(r=>r.qualificationCode)).size;

document.getElementById('subtitle').textContent=`Welcome, ${user.name}`;

document.getElementById('stats').innerHTML=[
  {icon:'🎓',label:'Total Students',value:students.length,bg:'#E0E7FF'},
  {icon:'📝',label:'Active Registrations',value:approvedRegs.length,bg:'#D1FAE5'},
  {icon:'📚',label:'Programmes Running',value:progCount,bg:'#FEF3C7'},
].map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.bg}"><span>${s.icon}</span></div><div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

document.getElementById('table-wrap').innerHTML=`<table class="data-table"><thead><tr><th>Student</th><th>Student ID</th><th>Programme</th><th>Semester</th><th>Modules</th></tr></thead><tbody>
${approvedRegs.length===0?`<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--rf-gray)">No enrolled students yet</td></tr>`:
approvedRegs.map(r=>{
  const student=users.find(u=>u.studentId===r.studentId);
  return `<tr>
    <td style="font-weight:600">${student?.name||'Unknown'}</td>
    <td style="font-family:var(--font-mono);font-size:12px;color:var(--rf-blue)">${r.studentId}</td>
    <td>${r.qualificationName}</td>
    <td>Sem ${r.semester}, ${r.year}</td>
    <td>${r.modules.length} modules</td>
  </tr>`;
}).join('')}
</tbody></table>`;
</script>
</body>
</html>
