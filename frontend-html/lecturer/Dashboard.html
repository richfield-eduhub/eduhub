<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lecturer Dashboard — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content">
    <h1 class="section-title">LECTURER PORTAL</h1>
    <p class="section-subtitle" id="welcome-sub">Loading...</p>
    <div class="grid-3 mb-24" id="stats-row"></div>
    <div class="card">
      <div class="card-header"><span class="card-title">Enrolled Students by Programme</span></div>
      <div id="students-table"><div style="padding:32px;text-align:center;color:var(--rf-gray)">Loading...</div></div>
    </div>
  </div>
  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('lecturer');
    if (user) { (async()=>{ await renderNavbar('dashboard'); await init(); })(); }

    async function init() {
      document.getElementById('welcome-sub').textContent = `Welcome, ${user.name}`;
      const [adminUsers, regs] = await Promise.all([getAdminUsers(), getRegistrations()]);
      const students = adminUsers.filter(u=>u.role==='student');
      const approvedRegs = regs.filter(r=>r.status==='allocated');
      const programmes = new Set(approvedRegs.map(r=>r.qualificationCode)).size;

      document.getElementById('stats-row').innerHTML = [
        {icon:'🎓',label:'Total Students',value:students.length,bg:'#E0E7FF'},
        {icon:'📝',label:'Allocated Registrations',value:approvedRegs.length,bg:'#D1FAE5'},
        {icon:'📚',label:'Programmes Running',value:programmes,bg:'#FEF3C7'},
      ].map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.bg}"><span>${s.icon}</span></div><div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

      const tableEl = document.getElementById('students-table');
      if (approvedRegs.length===0){tableEl.innerHTML='<div style="padding:32px;text-align:center;color:var(--rf-gray)">No enrolled students yet</div>';return;}
      tableEl.innerHTML=`<table class="data-table">
        <thead><tr><th>Student</th><th>Student ID</th><th>Programme</th><th>Year / Sem</th><th>Modules</th></tr></thead>
        <tbody>${approvedRegs.map(r=>{
          const s=adminUsers.find(u=>u.studentId===r.studentId);
          return `<tr>
            <td style="font-weight:600">${s?.name||'Unknown'}</td>
            <td style="font-family:var(--font-mono);font-size:12px;color:var(--rf-blue)">${r.studentId}</td>
            <td>${r.qualificationName}</td>
            <td style="font-size:13px">Year ${r.studyYear}, Sem ${r.semester}</td>
            <td>${r.modules.length} modules</td>
          </tr>`;
        }).join('')}</tbody></table>`;
    }
  </script>
</body>
</html>
