<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Programmes — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    .prog-card{background:white;width:320px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden;border:1px solid #e5e7eb;transition:transform .2s,box-shadow .2s}
    .prog-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(18,63,122,.15)}
  </style>
</head>
<body>
  <div id="navbar-root"></div>
  <div style="background:linear-gradient(135deg,#123f7a 0%,#1a5fa8 100%);color:white;padding:60px 40px;text-align:center">
    <h1 style="font-size:44px;font-weight:900;margin-bottom:12px;letter-spacing:1px">Our Programmes</h1>
    <p style="font-size:18px;opacity:.85;max-width:560px;margin:0 auto">Nationally accredited qualifications designed to launch your career</p>
  </div>
  <div style="max-width:1100px;margin:0 auto;padding:48px 24px">
    <div style="display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:40px" id="filters">
      <div class="filter-btn active" onclick="filterProgs('all',this)" style="padding:8px 20px;border-radius:99px;background:#123f7a;color:white;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">All</div>
      <div class="filter-btn" onclick="filterProgs('it',this)" style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Information Technology</div>
      <div class="filter-btn" onclick="filterProgs('business',this)" style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Business Science</div>
      <div class="filter-btn" onclick="filterProgs('creative',this)" style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Creative Arts</div>
    </div>
    <div id="progs-grid" style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center"></div>
  </div>
  <div style="background:#123f7a;color:white;padding:48px;text-align:center">
    <h2 style="font-size:28px;font-weight:900;margin-bottom:12px">Ready to start your journey?</h2>
    <p style="opacity:.85;margin-bottom:24px;font-size:16px">Apply online today — it only takes a few minutes.</p>
    <a href="Apply.html" style="background:#ffc72c;color:#123f7a;padding:14px 36px;font-size:16px;font-weight:800;border-radius:4px;text-decoration:none">Apply Now →</a>
  </div>
  <script src="../shared-local.js"></script>
  <script>
    renderNavbar('programmes');
    const PROGS = [
      {slug:'bsc-it',title:'BSc Information Technology',code:'BSc IT',faculty:'Faculty of Information Technology',duration:'3 Years',nqf:'NQF Level 7',icon:'💻',color:'#123f7a',cat:'it',
        desc:'Learn programming, networking, cybersecurity and data science.',fee:45000},
      {slug:'bcom',title:'Bachelor of Commerce',code:'BCom',faculty:'Faculty of Business Science',duration:'3 Years',nqf:'NQF Level 7',icon:'📊',color:'#1e6b3c',cat:'business',
        desc:'Develop financial, management and business leadership skills.',fee:42000},
      {slug:'bba',title:'Bachelor of Business Administration',code:'BBA',faculty:'Faculty of Business Science',duration:'3 Years',nqf:'NQF Level 7',icon:'🏢',color:'#7c3aed',cat:'business',
        desc:'Build strong management and entrepreneurship knowledge.',fee:40000},
      {slug:'nd-it',title:'National Diploma: Information Technology',code:'ND IT',faculty:'Faculty of IT',duration:'3 Years',nqf:'NQF Level 6',icon:'🖥️',color:'#0369a1',cat:'it',
        desc:'A practical programme developing core IT skills.',fee:38000},
      {slug:'graphic-design',title:'Higher Certificate: Graphic Design',code:'HC GD',faculty:'Faculty of Creative Arts',duration:'1 Year',nqf:'NQF Level 5',icon:'🎨',color:'#be185d',cat:'creative',
        desc:'Creative design, typography, branding and digital media.',fee:28000},
      {slug:'nd-business',title:'National Diploma: Business Studies',code:'ND BS',faculty:'Faculty of Business Science',duration:'3 Years',nqf:'NQF Level 6',icon:'📋',color:'#b45309',cat:'business',
        desc:'Core business disciplines: marketing, HR, finance and management.',fee:34000},
    ];
    let current = 'all';
    function filterProgs(cat, btn) {
      current = cat;
      document.querySelectorAll('.filter-btn').forEach(b => { b.style.background='white'; b.style.color='#123f7a'; });
      btn.style.background='#123f7a'; btn.style.color='white';
      render();
    }
    function render() {
      const filtered = current==='all' ? PROGS : PROGS.filter(p=>p.cat===current);
      document.getElementById('progs-grid').innerHTML = filtered.map(p=>`
        <div class="prog-card">
          <div style="background:${p.color};padding:20px 24px;color:white">
            <div style="font-size:32px;margin-bottom:8px">${p.icon}</div>
            <div style="font-weight:800;font-size:16px">${p.title}</div>
            <div style="font-size:12px;opacity:.8;margin-top:4px">${p.faculty}</div>
          </div>
          <div style="padding:20px 24px">
            <p style="font-size:14px;color:#374151;line-height:1.6;margin-bottom:16px">${p.desc}</p>
            <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
              <span style="background:#EEF2FF;color:#3730a3;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">${p.nqf}</span>
              <span style="background:#FEF3C7;color:#92400e;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">⏱ ${p.duration}</span>
              <span style="background:#D1FAE5;color:#065f46;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">R${p.fee.toLocaleString()}/yr</span>
            </div>
            <div style="display:flex;gap:8px">
              <a href="Apply.html" style="flex:1;text-align:center;background:#ffc72c;color:#123f7a;padding:9px 0;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none">Apply Now</a>
            </div>
          </div>
        </div>`).join('');
    }
    render();
  </script>
</body>
</html>
