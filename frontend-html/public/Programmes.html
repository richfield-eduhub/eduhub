<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Programmes — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
  <style>
    .prog-header { background: linear-gradient(135deg, #123f7a 0%, #1a5fa8 100%); color: white; padding: 60px 40px; text-align: center; }
    .prog-card { background: white; width: 320px; border-radius: 10px; box-shadow: var(--shadow-sm); overflow: hidden; border: 1px solid var(--rf-border); transition: transform .2s, box-shadow .2s; }
    .prog-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(18,63,122,.15); }
    .prog-top { padding: 20px 24px; color: white; }
    .prog-body { padding: 20px 24px; }
  </style>
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>

  <div class="prog-header">
    <h1 style="font-size:44px;font-weight:900;margin-bottom:12px;letter-spacing:1px">Our Programmes</h1>
    <p style="font-size:18px;opacity:.85;max-width:560px;margin:0 auto">Nationally accredited qualifications designed to launch your career</p>
  </div>

  <div style="max-width:1100px;margin:0 auto;padding:48px 24px">
    <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-bottom:40px">
      <div style="padding:8px 20px;border-radius:99px;background:#123f7a;color:white;border:1.5px solid #123f7a;font-size:14px;font-weight:600">All</div>
      <div style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Information Technology</div>
      <div style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Business Science</div>
      <div style="padding:8px 20px;border-radius:99px;background:white;color:#123f7a;border:1.5px solid #123f7a;font-size:14px;font-weight:600;cursor:pointer">Creative Arts</div>
    </div>

    <div style="display:flex;gap:24px;flex-wrap:wrap;justify-content:center" id="prog-list"></div>
  </div>

  <div style="background:#123f7a;color:white;padding:48px;text-align:center">
    <h2 style="font-size:28px;font-weight:900;margin-bottom:12px">Ready to start your journey?</h2>
    <p style="opacity:.85;margin-bottom:24px;font-size:16px">Apply online today — it only takes a few minutes.</p>
    <a href="/apply" style="background:#ffc72c;color:#123f7a;padding:14px 36px;font-size:16px;font-weight:800;border-radius:4px;text-decoration:none">Apply Now →</a>
  </div>

  <div id="footer-placeholder"></div>

  <script src="../shared.js"></script>
  <script>
    await renderNavbar('programmes');
    renderFooter();

    const PROGS = [
      { code:'BICT', icon:'💻', color:'#123f7a', title:'Bachelor of ICT', faculty:'Faculty of IT', nqf:'NQF Level 7', duration:'3 Years', fee:45000, desc:'Learn programming, networking, cybersecurity and data science.' },
      { code:'NDBS', icon:'📋', color:'#b45309', title:'National Diploma: Business Studies', faculty:'Business & Management', nqf:'NQF Level 6', duration:'3 Years', fee:38000, desc:'Core business disciplines: marketing, HR, finance and management.' },
      { code:'HDGD', icon:'🎨', color:'#be185d', title:'Higher Certificate: Graphic Design', faculty:'Creative Arts & Design', nqf:'NQF Level 5', duration:'1 Year', fee:32000, desc:'Creative design, typography, branding and digital media production.' },
      { code:'NDIT', icon:'🖥️', color:'#0369a1', title:'National Diploma: IT', faculty:'Faculty of IT', nqf:'NQF Level 6', duration:'3 Years', fee:42000, desc:'A practical programme developing core IT skills for the modern workplace.' },
    ];

    document.getElementById('prog-list').innerHTML = PROGS.map(p => `
      <div class="prog-card">
        <div class="prog-top" style="background:${p.color}">
          <div style="font-size:32px;margin-bottom:8px">${p.icon}</div>
          <div style="font-weight:800;font-size:16px">${p.title}</div>
          <div style="font-size:12px;opacity:.8;margin-top:4px">${p.faculty}</div>
        </div>
        <div class="prog-body">
          <p style="font-size:14px;color:var(--rf-gray);line-height:1.6;margin-bottom:16px">${p.desc}</p>
          <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
            <span style="background:#EEF2FF;color:#3730a3;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">${p.nqf}</span>
            <span style="background:#FEF3C7;color:#92400e;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">⏱ ${p.duration}</span>
            <span style="background:#D1FAE5;color:#065f46;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px">R${p.fee.toLocaleString()}/yr</span>
          </div>
          <div style="display:flex;gap:8px">
            <a href="/apply" style="flex:1;text-align:center;background:#123f7a;color:white;padding:9px 0;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none">Apply Now</a>
          </div>
        </div>
      </div>`).join('');
  </script>
</body>
</html>
