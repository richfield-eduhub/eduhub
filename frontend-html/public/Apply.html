<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Apply — EduHub</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    body{background:#f4f4f4}
    .step-panel{display:none}.step-panel.active{display:block}
    .type-card{flex:1;min-width:160px;border:2px solid #e5e7eb;border-radius:10px;padding:16px 14px;cursor:pointer;background:white;transition:all .15s;text-align:center}
    .type-card.selected{border-color:#123f7a;background:#EEF2FF}
    .qual-card{border:2px solid #e5e7eb;border-radius:8px;padding:14px 16px;cursor:pointer;background:white;transition:all .15s;margin-bottom:10px}
    .qual-card.selected{border-color:#123f7a;background:#EEF2FF}
    .module-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:8px;cursor:pointer;border:2px solid #e5e7eb;background:#fafafa;transition:all .12s;margin-bottom:8px}
    .module-row.picked{border-color:#123f7a;background:#EEF2FF}
    .chk{width:22px;height:22px;border-radius:5px;border:2px solid #d1d5db;background:white;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
    .module-row.picked .chk{background:#123f7a;border-color:#123f7a;color:white;font-weight:700}
    .form-section-header{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:2px solid #e5e7eb;margin-bottom:16px}
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div id="app" style="max-width:780px;margin:0 auto;padding:32px 24px;min-height:100vh"></div>
<script src="../shared.js"></script>
<script>
const NATIONALITIES_LIST = ['South African','Zimbabwean','Mozambican','Zambian','Malawian','Botswanan','Namibian','Swazi','Lesothan','Congolese (DRC)','Nigerian','Ghanaian','Kenyan','Tanzanian','Ugandan','Rwandan','British','American','Canadian','Australian','German','French','Indian','Pakistani','Brazilian','Other'];
const NEW_STEPS = ['Personal','Contact & Address','Education','Qualification','Documents','Review & Submit'];
const RETURNING_STEPS = ['Verify Identity','Confirm Details','New Modules','Review & Submit'];
// Re-enrolment from student dashboard: skip identity lookup, personal info & docs
const REENROL_STEPS = ['New Modules','Review & Submit'];

// ── Detect re-enrolment mode passed from student Dashboard ──
const _urlParams = new URLSearchParams(window.location.search);
const REENROL_MODE   = _urlParams.get('mode') === 'reenrol';
const REENROL_CURRENT_YEAR = parseInt(_urlParams.get('currentYear') || '1', 10);
const REENROL_NEXT_YEAR    = parseInt(_urlParams.get('nextYear')    || '2', 10);
const REENROL_QUAL_CODE    = _urlParams.get('qualCode')  || '';
const REENROL_STUDENT_ID   = _urlParams.get('studentId') || '';

// Pre-fetch existing student record for re-enrolment
let _reenrolStudent = null;
if (REENROL_MODE && REENROL_STUDENT_ID) {
  // Try to find by studentId from approved applications
  const _allApps = getApplications ? getApplications() : [];
  const _found = _allApps.find(a => a.studentId === REENROL_STUDENT_ID && a.status === 'approved');
  if (_found) {
    _reenrolStudent = { application: _found, user: { name: (_found.firstName||'') + ' ' + (_found.lastName||''), studentId: _found.studentId } };
  }
}

// Compute allowed admission-for options for this student
// A 1st-year student can ONLY apply for 2nd Year (nextYear = currentYear + 1)
function getAllowedAdmissionOptions() {
  if (!REENROL_MODE) return ['1st Semester','2nd Semester','1st Year','2nd Year','3rd Year'];
  const nextY = REENROL_NEXT_YEAR;
  // Only allow the exact next year (no skipping, no going back)
  if (nextY === 2) return ['2nd Year'];
  if (nextY === 3) return ['3rd Year'];
  return [`${nextY}th Year`];
}

let state = {
  // In re-enrol mode: lock type to 'returning', pre-confirm type selection, auto-load student
  appType: REENROL_MODE ? 'returning' : null,
  admissionFor: REENROL_MODE ? (REENROL_NEXT_YEAR === 2 ? '2nd Year' : REENROL_NEXT_YEAR === 3 ? '3rd Year' : '2nd Year') : '',
  studyYear: REENROL_NEXT_YEAR,
  typeConfirmed: REENROL_MODE ? true : false,
  step: REENROL_MODE ? 0 : 0,
  submitted: false, submittedApp: null,
  lookupValue: '', lookupError: '',
  foundStudent: REENROL_MODE && _reenrolStudent ? _reenrolStudent : null,
  reenrolMode: REENROL_MODE,
  form: {
    firstName:'',lastName:'',idNumber:'',passportNumber:'',
    dateOfBirth:'',gender:'',nationality:'South African',
    phone:'',email:'',altEmail:'',
    streetAddress:'',suburb:'',city:'',province:'',postalCode:'',
    highSchool:'',highSchoolYear:'',highestGrade:'',
    tertiaryInstitution:'',tertiaryQualification:'',tertiaryYear:'',
    payerName:'',payerRelation:'',payerPhone:'',payerEmail:'',payerAddress:'',
    qualificationCode: REENROL_MODE ? REENROL_QUAL_CODE : '',
    qualificationName:'',
    docsUploaded:[],tcAccepted:false
  },
  errors: {}
};

// If re-enrol mode and student found, pre-fill form from existing record
if (REENROL_MODE && _reenrolStudent) {
  const a = _reenrolStudent.application;
  state.form = {
    ...state.form,
    firstName: a.firstName||'', lastName: a.lastName||'',
    idNumber: a.idNumber||'', passportNumber: a.passportNumber||'',
    dateOfBirth: a.dateOfBirth||'', gender: a.gender||'',
    nationality: a.nationality||'South African',
    phone: a.phone||'', email: a.email||'', altEmail: a.altEmail||'',
    streetAddress: a.streetAddress||'', suburb: a.suburb||'',
    city: a.city||'', province: a.province||'', postalCode: a.postalCode||'',
    highSchool: a.highSchool||'', highSchoolYear: a.highSchoolYear||'',
    highestGrade: a.highestGrade||'',
    payerName: a.payerName||'', payerRelation: a.payerRelation||'',
    payerPhone: a.payerPhone||'', payerEmail: a.payerEmail||'',
    payerAddress: a.payerAddress||'',
    qualificationCode: a.qualificationCode||REENROL_QUAL_CODE,
    qualificationName: a.qualificationName||'',
    docsUploaded:[], tcAccepted:false
  };
  // In re-enrol mode, jump straight to modules step (step 0 of REENROL_STEPS = modules)
  state.step = 0;
}

// Update form field WITHOUT re-rendering (prevents focus/cursor loss on every keystroke)
function set(k,v){ state.form[k]=v; }
// Update field AND re-render (only for structural changes like nationality toggle)
function setAndRender(k,v){ state.form[k]=v; render(); }
function setState(patch){ Object.assign(state, patch); render(); }
function isForeign(){ return state.form.nationality !== 'South African'; }

// Returns the active step array depending on mode
function getSteps() {
  if (state.reenrolMode) return REENROL_STEPS;
  if (state.appType === 'returning') return RETURNING_STEPS;
  return NEW_STEPS;
}

function validate() {
  const e={}, f=state.form, s=state.step, t=state.appType;
  const STEPS = getSteps();
  // Re-enrolment from dashboard: only T&C needed on last step, no personal/doc validation
  if (!state.reenrolMode) {
    if (t==='new'||t==='other') {
      if(s===0){
        if(!f.firstName)e.firstName='Required';
        if(!f.lastName)e.lastName='Required';
        if(!f.nationality)e.nationality='Required';
        if(!isForeign()){
          if(!f.idNumber||f.idNumber.length<13) e.idNumber='Enter a valid 13-digit SA ID';
          else if(f.dateOfBirth && !validateSAIdDOB(f.idNumber, f.dateOfBirth))
            e.idNumber='First 6 digits of your ID must match your date of birth (YYMMDD). E.g. born 2002-09-08 → ID starts with 020908';
        }
        if(isForeign()&&(!f.passportNumber||f.passportNumber.length<5))e.passportNumber='Valid passport required';
        if(!f.dateOfBirth)e.dateOfBirth='Required';
        if(!f.gender)e.gender='Required';
      }
      if(s===1){if(!f.phone)e.phone='Required';if(!f.email||!f.email.includes('@'))e.email='Enter a valid email';if(!f.streetAddress)e.streetAddress='Required';if(!f.city)e.city='Required';if(!f.province)e.province='Required';}
      if(s===2){if(!f.highSchool)e.highSchool='Required';if(!f.highestGrade)e.highestGrade='Required';}
      if(s===3){if(!f.qualificationCode)e.qualificationCode='Please select a qualification';if(!f.payerName)e.payerName='Required';if(!f.payerPhone)e.payerPhone='Required';}
    }
    if(t==='returning'&&s===1){if(!f.phone)e.phone='Required';if(!f.email||!f.email.includes('@'))e.email='Required';}
  }
  if(s===STEPS.length-1&&!f.tcAccepted)e.tcAccepted='You must accept the Terms and Conditions';
  state.errors=e;
  render();
  return Object.keys(e).length===0;
}

function admissionToYear(af){ if(af==='2nd Year')return 2;if(af==='3rd Year')return 3;return 1; }

function handleSubmit(){
  if(!validate())return;
  const yr = state.reenrolMode ? REENROL_NEXT_YEAR
    : (state.appType==='returning' ? admissionToYear(state.admissionFor) : state.studyYear);
  const appType = state.reenrolMode ? 'returning'
    : (state.appType==='returning' ? 'returning' : state.appType==='other' ? 'other' : 'new');
  const admFor = state.reenrolMode
    ? (REENROL_NEXT_YEAR===2?'2nd Year':REENROL_NEXT_YEAR===3?'3rd Year':'2nd Year')
    : (state.admissionFor||'1st Semester');
  const app = submitApplication({...state.form, applicationType:appType, admissionFor:admFor, studyYear:yr});
  setState({submitted:true, submittedApp:{studentId:app.studentId||state.form.idNumber,id:app.id}});
}

function handleLookup(){
  state.lookupError='';
  if(!state.lookupValue.trim()){state.lookupError='Please enter your ID or passport number.';render();return;}
  const result = findStudentByIdOrPassport(state.lookupValue.trim());
  if(!result){state.lookupError='No approved student record found. Please contact admissions.';render();return;}
  const a=result.application;
  state.form={firstName:a.firstName,lastName:a.lastName,idNumber:a.idNumber,passportNumber:a.passportNumber,dateOfBirth:a.dateOfBirth,gender:a.gender,nationality:a.nationality,phone:a.phone,email:a.email,altEmail:a.altEmail||'',streetAddress:a.streetAddress,suburb:a.suburb,city:a.city,province:a.province,postalCode:a.postalCode,highSchool:a.highSchool,highSchoolYear:a.highSchoolYear,highestGrade:a.highestGrade,tertiaryInstitution:a.tertiaryInstitution||'',tertiaryQualification:a.tertiaryQualification||'',tertiaryYear:a.tertiaryYear||'',payerName:a.payerName,payerRelation:a.payerRelation,payerPhone:a.payerPhone,payerEmail:a.payerEmail,payerAddress:a.payerAddress,qualificationCode:a.qualificationCode,qualificationName:a.qualificationName,docsUploaded:[],tcAccepted:false};
  state.foundStudent=result; state.step=1; render();
}

function toggleDoc(doc){
  const docs=state.form.docsUploaded;
  state.form.docsUploaded=docs.includes(doc)?docs.filter(d=>d!==doc):[...docs,doc];render();
}

function errSpan(k){ return state.errors[k]?`<div style="color:#dc2626;font-size:12px;margin-top:3px">⚠ ${state.errors[k]}</div>`:''; }
function inp(key,placeholder,type='text',extra=''){
  return `<input type="${type}" value="${(state.form[key]||'').replace(/"/g,'&quot;')}" placeholder="${placeholder}" oninput="set('${key}',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors[key]?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px" ${extra}/>`;
}
function selNat(){
  return `<select onchange="setAndRender('nationality',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.nationality?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px;background:white">${NATIONALITIES_LIST.map(n=>`<option value="${n}" ${state.form.nationality===n?'selected':''}>${n}</option>`).join('')}</select>`;
}

function renderStepper(steps){
  return `<div class="stepper" style="margin-bottom:32px">${steps.map((s,i)=>`
    <div class="step ${i<state.step?'done':i===state.step?'active':''}">
      <div class="step-num">${i<state.step?'✓':i+1}</div>
      <div class="step-label">${s}</div>
    </div>`).join('')}</div>`;
}

function render(){
  const app = document.getElementById('app');
  const f=state.form;

  // ── SUBMITTED ──
  if(state.submitted && state.submittedApp){
    app.innerHTML=`
      <div style="max-width:620px;width:100%;margin:0 auto">
        <div style="background:linear-gradient(135deg,#001A4D,#123f7a);color:white;border-radius:16px;padding:32px;text-align:center;margin-bottom:20px">
          <div style="font-size:56px;margin-bottom:12px">${state.appType==='returning'?'🔄':'🎉'}</div>
          <h2 style="font-size:28px;letter-spacing:2px;margin-bottom:8px">${state.appType==='returning'?'RE-ENROLMENT SUBMITTED!':'APPLICATION SUBMITTED!'}</h2>
          <p style="opacity:.85;font-size:15px;margin-bottom:16px">Your application has been received and is under review.</p>
          <div style="font-size:13px;opacity:.7;margin-bottom:6px">YOUR STUDENT REFERENCE NUMBER</div>
          <div style="font-family:monospace;font-size:22px;background:rgba(255,255,255,.15);padding:8px 20px;border-radius:8px;display:inline-block;letter-spacing:1px">${state.submittedApp.studentId}</div>
        </div>
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:24px">
          <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:16px">
            ⏱ <strong>Next Steps:</strong> Our admissions team will review within <strong>3–5 business days</strong>. You'll be contacted at <strong>${f.email}</strong>.
          </div>
          <a href="#" onclick="window.location.href=rootPath('index.html')" style="display:block;background:#123f7a;color:white;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none">← Back to Home</a>
        </div>
      </div>`;
    return;
  }

  // ── TYPE SELECTION ──
  if(!state.typeConfirmed){
    // When accessed from student dashboard: hide New Student, restrict year options
    const fromDashboard = REENROL_MODE;
    // Available application types
    const typeOptions = fromDashboard
      ? [{v:'returning',l:'🔄 Returning Student',d:'Re-enrol for your next academic year'},{v:'other',l:'📋 Other',d:'Transfer, re-admission or special cases'}]
      : [{v:'new',l:'🆕 New Student',d:'Applying to EduHub for the first time'},{v:'returning',l:'🔄 Returning Student',d:'Previously enrolled, continuing studies'},{v:'other',l:'📋 Other',d:'Transfer, re-admission or special cases'}];
    // Available year/semester options — from dashboard: no 1st Year, and only allowed next year
    const admissionOptions = getAllowedAdmissionOptions();
    app.innerHTML=`
      <div style="max-width:640px;width:100%;margin:0 auto">
        <div style="text-align:center;margin-bottom:32px">
          <h1 style="font-size:32px;color:#001A4D;letter-spacing:1px;margin-bottom:8px">APPLICATION FOR ADMISSION</h1>
          <p style="color:#6b7280;font-size:15px">${fromDashboard?`You are currently in <strong>Year ${REENROL_CURRENT_YEAR}</strong>. You may apply for Year ${REENROL_NEXT_YEAR} below.`:'Please tell us about your application before we begin.'}</p>
        </div>
        ${fromDashboard?`<div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:14px;color:#3730a3">
          <strong>📋 Re-enrolment Notice:</strong> As an existing student, you may re-enrol as a <em>Returning Student</em> or apply under <em>Other</em> (e.g. re-admission). New Student applications are not available here since your record already exists in our system.
        </div>`:''}
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:16px">Application Type <span style="color:#e8192c">*</span></div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            ${typeOptions.map(o=>`
            <div class="type-card ${state.appType===o.v?'selected':''}" onclick="setState({appType:'${o.v}'})">
              <div style="font-size:20px;margin-bottom:6px">${o.l.split(' ')[0]}</div>
              <div style="font-weight:700;font-size:14px;color:#001A4D">${o.l.split(' ').slice(1).join(' ')}</div>
              <div style="font-size:12px;color:#6b7280;margin-top:4px">${o.d}</div>
            </div>`).join('')}
          </div>
        </div>
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:16px">Admission Application For <span style="color:#e8192c">*</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${admissionOptions.map(o=>`
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border:1.5px solid ${state.admissionFor===o?'#123f7a':'#e5e7eb'};border-radius:8px;background:${state.admissionFor===o?'#EEF2FF':'white'};transition:all .15s">
              <input type="radio" name="af" value="${o}" ${state.admissionFor===o?'checked':''} onchange="setState({admissionFor:'${o}',studyYear:${o.includes('2nd Year')?2:o.includes('3rd Year')?3:1}})" style="accent-color:#123f7a;width:16px;height:16px"/>
              <span style="font-weight:600;font-size:14px;color:#001A4D">${o}</span>
            </label>`).join('')}
          </div>
          ${fromDashboard?`<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#92400e">⚠ You are in <strong>Year ${REENROL_CURRENT_YEAR}</strong>. You can only apply for <strong>Year ${REENROL_NEXT_YEAR}</strong> at this time.</div>`:''}
        </div>
        ${state.appType!=='returning'?`
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:12px">Course Applied For</div>
          <select onchange="set('qualificationCode',this.value);set('qualificationName',QUALIFICATIONS.find(q=>q.code===this.value)?.name||'')" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;color:#001A4D;background:white">
            <option value="">Please Select</option>
            ${QUALIFICATIONS.map(q=>`<option value="${q.code}" ${f.qualificationCode===q.code?'selected':''}>${q.name}</option>`).join('')}
          </select>
        </div>`:''}
        <button onclick="confirmType()" style="width:100%;background:${state.appType?'#ffc72c':'#e5e7eb'};color:${state.appType?'#123f7a':'#9ca3af'};border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:800;cursor:${state.appType?'pointer':'not-allowed'}">
          ${state.appType==='returning'?'Continue as Returning Student →':'Start New Application →'}
        </button>
      </div>`;
    return;
  }

  // ── RE-ENROLMENT FROM DASHBOARD (bypass all personal/doc steps) ──
  if(state.reenrolMode){
    const yr = REENROL_NEXT_YEAR;
    const qualCode = state.form.qualificationCode || REENROL_QUAL_CODE;
    const qual = QUALIFICATIONS.find(q=>q.code===qualCode);
    const newMods = qual ? qual.modules.filter(m=>m.year===yr) : [];
    const studentName = state.foundStudent ? state.foundStudent.user.name : (state.form.firstName ? state.form.firstName+' '+state.form.lastName : 'Student');
    const studentId = state.foundStudent ? (state.foundStudent.user.studentId||REENROL_STUDENT_ID) : REENROL_STUDENT_ID;
    const qualName = (qual ? qual.name : '') || state.form.qualificationName || '';
    app.innerHTML=`
      <div style="max-width:700px;width:100%;margin:0 auto">
        <a href="../student/Dashboard.html" style="display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#123f7a;font-weight:600;cursor:pointer;font-size:14px;margin-bottom:20px;text-decoration:none">← Back to Dashboard</a>
        <div style="background:linear-gradient(135deg,#001A4D,#123f7a);color:white;border-radius:14px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px">
          <div style="font-size:36px">🔄</div>
          <div>
            <div style="font-size:18px;font-weight:800;letter-spacing:.5px">YEAR ${yr} RE-ENROLMENT</div>
            <div style="font-size:13px;opacity:.85;margin-top:2px">Welcome back, <strong>${studentName}</strong> · Student ID: ${studentId}</div>
            <div style="font-size:12px;opacity:.7;margin-top:2px">${qualName}</div>
          </div>
        </div>
        ${renderStepper(REENROL_STEPS)}
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px">
          ${state.step===0?`
            <div class="form-section-header"><span style="font-size:22px">📚</span><h3 style="font-weight:700;font-size:17px;color:#001A4D">Your Year ${yr} Modules</h3></div>
            <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:14px 16px;font-size:14px;color:#3730a3;margin-bottom:16px">
              These modules will be assigned to your record upon re-enrolment for <strong>Year ${yr}</strong>. No action is needed — just review and proceed.
            </div>
            ${newMods.length===0
              ?'<div style="text-align:center;padding:32px;color:#6b7280"><div style="font-size:40px;margin-bottom:12px">📭</div>No modules found for Year '+yr+'. Please contact admissions.</div>'
              :[1,2].map(sem=>{const sm=newMods.filter(m=>m.semester===sem);if(!sm.length)return '';return `
                <div style="font-weight:700;font-size:14px;color:#123f7a;margin:0 0 10px;display:flex;align-items:center;gap:8px"><span style="background:#123f7a;color:white;padding:2px 10px;border-radius:99px;font-size:12px">Semester ${sem}</span></div>
                ${sm.map((m,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#F4F6FB;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:8px">
                  <div style="width:30px;height:30px;background:#123f7a;border-radius:7px;color:white;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
                  <div style="flex:1"><div style="font-weight:600;font-size:14px">${m.name}</div><div style="font-size:12px;color:#6b7280;font-family:monospace">${m.code} · ${m.credits} credits</div></div>
                  <div style="background:#D1FAE5;color:#065f46;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;flex-shrink:0">Sem ${sem}</div>
                </div>`).join('')}`;}).join('')}
          `:''}
          ${state.step===1?`

  const uploadedCount = f.docsUploaded.length;
  const totalCount = docList.length;
  const pct = totalCount > 0 ? Math.round(uploadedCount/totalCount*100) : 0;
  let html = '';
  html += '<div class="form-section-header"><span style="font-size:20px">&#128206;</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Required Documents</h3></div>';
  html += '<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:10px;padding:14px 18px;margin-bottom:16px">';
  html += '<div style="font-weight:700;color:#92400e;font-size:14px;margin-bottom:4px">&#9200; Important: Document Submission Deadline</div>';
  html += '<div style="font-size:13px;color:#92400e;line-height:1.6">You may mark documents as ready now or submit them later. However, <strong>all documents must be received within 3&#8211;5 business working days</strong> of your application being approved. <strong>Failure to submit within this period will result in your application being cancelled</strong> and you will need to start a new application.</div>';
  html += '</div>';
  if(isForeign()){
    html += '<div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:12px">&#127757; As a foreign national, additional documents including a study permit and SAQA evaluation are required.</div>';
  }
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
  html += '<div style="font-size:13px;color:#6b7280">'+uploadedCount+' of '+totalCount+' documents ready</div>';
  if(uploadedCount === totalCount && totalCount > 0){
    html += '<button type="button" onclick="state.form.docsUploaded=[];render()" style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Clear All</button>';
  }
  html += '</div>';
  html += '<div style="width:100%;background:#e5e7eb;border-radius:99px;height:6px;margin-bottom:16px">';
  html += '<div style="background:#123f7a;height:6px;border-radius:99px;width:'+pct+'%;transition:width .3s"></div>';
  html += '</div>';
  docList.forEach(function(doc, i){
    const isUploaded = f.docsUploaded.includes(doc);
    const inputId = 'doc-file-'+i;
    const safeDoc = doc.replace(/'/g, '&#39;');
    html += '<div style="border:1.5px solid '+(isUploaded?'#123f7a':'#e5e7eb')+';border-radius:10px;padding:14px 16px;background:'+(isUploaded?'#EEF2FF':'white')+';margin-bottom:10px;transition:all .15s">';
    html += '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
    html += '<div style="width:28px;height:28px;border-radius:6px;background:'+(isUploaded?'#123f7a':'#e5e7eb')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:'+(isUploaded?'white':'#9ca3af')+';font-weight:700">'+(isUploaded?'&#10003;':(i+1))+'</div>';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="font-size:14px;font-weight:600;color:'+(isUploaded?'#001A4D':'#374151')+'">'+doc+'</div>';
    html += '<div style="font-size:12px;color:'+(isUploaded?'#059669':'#9ca3af')+';margin-top:2px">'+(isUploaded?'&#10003; Marked as ready':'Not yet marked')+'</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:8px;align-items:center;flex-shrink:0">';
    html += '<label for="'+inputId+'" style="background:'+(isUploaded?'#f0fdf4':'#f4f6fb')+';color:'+(isUploaded?'#059669':'#374151')+';border:1px solid '+(isUploaded?'#86efac':'#e5e7eb')+';padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">&#128193; '+(isUploaded?'Replace':'Choose File')+'</label>';
    html += '<input type="file" id="'+inputId+'" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleDocFile(this,\'' + safeDoc + '\')" />';
    html += '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 10px;border:1px solid '+(isUploaded?'#86efac':'#e5e7eb')+';border-radius:6px;background:white;font-size:12px;color:#374151;white-space:nowrap">';
    html += '<input type="checkbox" '+(isUploaded?'checked':'')+' onchange="toggleDoc(\'' + safeDoc + '\');render()" style="width:14px;height:14px;accent-color:#123f7a;cursor:pointer"/> Ready</label>';
    html += '</div></div></div>';
  });
  html += '<div style="background:#F4F6FB;border:1px solid #e5e7eb;border-radius:8px;padding:13px 16px;font-size:13px;color:#6b7280;margin-top:4px;line-height:1.6">&#128161; <strong>Tip:</strong> Tick "Ready" to confirm you have the document available. You can also email documents to <strong>admissions@eduhub.ac.za</strong> quoting your student reference number after approval.</div>';
  return html;
}

function renderReview(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">✅</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Review Your Application</h3></div>
  ${renderReviewSection('Personal',[['Name',f.firstName+' '+f.lastName],['Nationality',f.nationality],[isForeign()?'Passport':'SA ID',isForeign()?f.passportNumber:f.idNumber],['DOB',f.dateOfBirth],['Gender',f.gender]])}
  ${renderReviewSection('Contact',[['Phone',f.phone],['Email',f.email],['Address',f.streetAddress+', '+f.city+', '+f.province]])}
  ${renderReviewSection('Education',[['High School',f.highSchool],['Grade',f.highestGrade]])}
  ${renderReviewSection('Qualification',[['Code',f.qualificationCode],['Name',f.qualificationName],['Payer',f.payerName],['Admission For',state.admissionFor]])}
  <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:12px">📧 A confirmation will be noted upon submission.</div>
  <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;margin-bottom:8px">
    <input type="checkbox" ${f.tcAccepted?'checked':''} onchange="set('tcAccepted',this.checked)" style="width:16px;height:16px;margin-top:2px;accent-color:#123f7a;flex-shrink:0"/>
    <span style="font-size:13px;color:#6b7280;line-height:1.6">I confirm all information is accurate and accept the <strong style="color:#123f7a">Terms and Conditions</strong>.</span>
  </label>
  ${errSpan('tcAccepted')}`;
}

function renderReviewSection(title,rows){
  return `<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px">
    <div style="background:#f9fafb;padding:9px 14px;font-weight:700;font-size:13px;border-bottom:1px solid #e5e7eb">${title}</div>
    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:8px">
      ${rows.map(([k,v])=>`<div style="display:flex;gap:12px;font-size:13px"><span style="color:#6b7280;min-width:130px">${k}</span><span style="font-weight:600;color:#001A4D">${v||'—'}</span></div>`).join('')}
    </div>
  </div>`;
}

function confirmType(){
  if(!state.appType){showToast('Please select an Application Type','error');return;}
  if(!state.admissionFor){showToast('Please select what you are applying for','error');return;}
  setState({typeConfirmed:true,step:0});
}


function handleDocFile(input, doc) {
  if (input.files && input.files[0]) {
    if (!state.form.docsUploaded.includes(doc)) {
      state.form.docsUploaded = [...state.form.docsUploaded, doc];
    }
    render();
    showToast(doc + ' — file selected ✓', 'success');
  }
}
renderNavbar('apply');
render();
</script>
</body>
</html>
