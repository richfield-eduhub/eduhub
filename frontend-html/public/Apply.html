<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Apply — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    body{background:#f4f4f4}
    .step-panel{display:none}.step-panel.active{display:block}
    .type-card{flex:1;min-width:160px;border:2px solid #e5e7eb;border-radius:10px;padding:16px 14px;cursor:pointer;background:white;transition:all .15s;text-align:center}
    .type-card.selected{border-color:#123f7a;background:#EEF2FF}
    .qual-card{border:2px solid #e5e7eb;border-radius:8px;padding:14px 16px;cursor:pointer;background:white;transition:all .15s;margin-bottom:10px}
    .qual-card.selected{border-color:#123f7a;background:#EEF2FF}
    .module-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:8px;cursor:pointer;border:2px solid #e5e7eb;background:#fafafa;transition:all .12s;margin-bottom:8px}
    .module-row.picked{border-color:#123f7a;background:#EEF2FF}
    .chk{width:22px;height:22px;border-radius:5px;border:2px solid #d1d5db;background:white;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
    .module-row.picked .chk{background:#123f7a;border-color:#123f7a;color:white;font-weight:700}
    .form-section-header{display:flex;align-items:center;gap:10px;padding-bottom:12px;border-bottom:2px solid #e5e7eb;margin-bottom:16px}
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div id="app" style="max-width:780px;margin:0 auto;padding:32px 24px;min-height:100vh"></div>
<script src="../shared-local.js"></script>
<script>
const NATIONALITIES_LIST = ['South African','Zimbabwean','Mozambican','Zambian','Malawian','Botswanan','Namibian','Swazi','Lesothan','Congolese (DRC)','Nigerian','Ghanaian','Kenyan','Tanzanian','Ugandan','Rwandan','British','American','Canadian','Australian','German','French','Indian','Pakistani','Brazilian','Other'];
const NEW_STEPS = ['Personal','Contact & Address','Education','Qualification','Documents','Review & Submit'];
const RETURNING_STEPS = ['Verify Identity','Confirm Details','New Modules','Review & Submit'];

let state = {
  appType: null, admissionFor: '', studyYear: 1, typeConfirmed: false,
  step: 0, submitted: false, submittedApp: null,
  lookupValue: '', lookupError: '', foundStudent: null,
  form: {
    firstName:'',lastName:'',idNumber:'',passportNumber:'',
    dateOfBirth:'',gender:'',nationality:'South African',
    phone:'',email:'',altEmail:'',
    streetAddress:'',suburb:'',city:'',province:'',postalCode:'',
    highSchool:'',highSchoolYear:'',highestGrade:'',
    tertiaryInstitution:'',tertiaryQualification:'',tertiaryYear:'',
    payerName:'',payerRelation:'',payerPhone:'',payerEmail:'',payerAddress:'',
    qualificationCode:'',qualificationName:'',
    docsUploaded:[],tcAccepted:false
  },
  errors: {}
};

function set(k,v){ state.form[k]=v; render(); }
function setState(patch){ Object.assign(state, patch); render(); }
function isForeign(){ return state.form.nationality !== 'South African'; }

function validate() {
  const e={}, f=state.form, s=state.step, t=state.appType;
  const STEPS = t==='returning' ? RETURNING_STEPS : NEW_STEPS;
  if (t==='new'||t==='other') {
    if(s===0){if(!f.firstName)e.firstName='Required';if(!f.lastName)e.lastName='Required';if(!f.nationality)e.nationality='Required';if(!isForeign()&&(!f.idNumber||f.idNumber.length<13))e.idNumber='Enter a valid 13-digit SA ID';if(isForeign()&&(!f.passportNumber||f.passportNumber.length<5))e.passportNumber='Valid passport required';if(!f.dateOfBirth)e.dateOfBirth='Required';if(!f.gender)e.gender='Required';}
    if(s===1){if(!f.phone)e.phone='Required';if(!f.email||!f.email.includes('@'))e.email='Enter a valid email';if(!f.streetAddress)e.streetAddress='Required';if(!f.city)e.city='Required';if(!f.province)e.province='Required';}
    if(s===2){if(!f.highSchool)e.highSchool='Required';if(!f.highestGrade)e.highestGrade='Required';}
    if(s===3){if(!f.qualificationCode)e.qualificationCode='Please select a qualification';if(!f.payerName)e.payerName='Required';if(!f.payerPhone)e.payerPhone='Required';}
  }
  if(t==='returning'&&s===1){if(!f.phone)e.phone='Required';if(!f.email||!f.email.includes('@'))e.email='Required';}
  if(s===STEPS.length-1&&!f.tcAccepted)e.tcAccepted='You must accept the Terms and Conditions';
  state.errors=e; render(); return Object.keys(e).length===0;
}

function admissionToYear(af){ if(af==='2nd Year')return 2;if(af==='3rd Year')return 3;return 1; }

function handleSubmit(){
  if(!validate())return;
  const yr = state.appType==='returning'?admissionToYear(state.admissionFor):state.studyYear;
  const app = submitApplication({...state.form, applicationType:state.appType==='returning'?'returning':state.appType==='other'?'other':'new', admissionFor:state.admissionFor||'1st Semester', studyYear:yr});
  setState({submitted:true, submittedApp:{studentId:app.studentId,id:app.id}});
}

function handleLookup(){
  state.lookupError='';
  if(!state.lookupValue.trim()){state.lookupError='Please enter your ID or passport number.';render();return;}
  const result = findStudentByIdOrPassport(state.lookupValue.trim());
  if(!result){state.lookupError='No approved student record found. Please contact admissions.';render();return;}
  const a=result.application;
  state.form={firstName:a.firstName,lastName:a.lastName,idNumber:a.idNumber,passportNumber:a.passportNumber,dateOfBirth:a.dateOfBirth,gender:a.gender,nationality:a.nationality,phone:a.phone,email:a.email,altEmail:a.altEmail||'',streetAddress:a.streetAddress,suburb:a.suburb,city:a.city,province:a.province,postalCode:a.postalCode,highSchool:a.highSchool,highSchoolYear:a.highSchoolYear,highestGrade:a.highestGrade,tertiaryInstitution:a.tertiaryInstitution||'',tertiaryQualification:a.tertiaryQualification||'',tertiaryYear:a.tertiaryYear||'',payerName:a.payerName,payerRelation:a.payerRelation,payerPhone:a.payerPhone,payerEmail:a.payerEmail,payerAddress:a.payerAddress,qualificationCode:a.qualificationCode,qualificationName:a.qualificationName,docsUploaded:[],tcAccepted:false};
  state.foundStudent=result; state.step=1; render();
}

function toggleDoc(doc){
  const docs=state.form.docsUploaded;
  state.form.docsUploaded=docs.includes(doc)?docs.filter(d=>d!==doc):[...docs,doc];render();
}

function errSpan(k){ return state.errors[k]?`<div style="color:#dc2626;font-size:12px;margin-top:3px">⚠ ${state.errors[k]}</div>`:''; }
function inp(key,placeholder,type='text',extra=''){
  return `<input type="${type}" value="${(state.form[key]||'').replace(/"/g,'&quot;')}" placeholder="${placeholder}" oninput="set('${key}',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors[key]?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px" ${extra}/>`;
}
function selNat(){
  return `<select onchange="set('nationality',this.value);render()" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.nationality?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px;background:white">${NATIONALITIES_LIST.map(n=>`<option value="${n}" ${state.form.nationality===n?'selected':''}>${n}</option>`).join('')}</select>`;
}

function renderStepper(steps){
  return `<div class="stepper" style="margin-bottom:32px">${steps.map((s,i)=>`
    <div class="step ${i<state.step?'done':i===state.step?'active':''}">
      <div class="step-num">${i<state.step?'✓':i+1}</div>
      <div class="step-label">${s}</div>
    </div>`).join('')}</div>`;
}

function render(){
  const app = document.getElementById('app');
  const f=state.form;

  // ── SUBMITTED ──
  if(state.submitted && state.submittedApp){
    app.innerHTML=`
      <div style="max-width:620px;width:100%;margin:0 auto">
        <div style="background:linear-gradient(135deg,#001A4D,#123f7a);color:white;border-radius:16px;padding:32px;text-align:center;margin-bottom:20px">
          <div style="font-size:56px;margin-bottom:12px">${state.appType==='returning'?'🔄':'🎉'}</div>
          <h2 style="font-size:28px;letter-spacing:2px;margin-bottom:8px">${state.appType==='returning'?'RE-ENROLMENT SUBMITTED!':'APPLICATION SUBMITTED!'}</h2>
          <p style="opacity:.85;font-size:15px;margin-bottom:16px">Your application has been received and is under review.</p>
          <div style="font-size:13px;opacity:.7;margin-bottom:6px">YOUR STUDENT REFERENCE NUMBER</div>
          <div style="font-family:monospace;font-size:22px;background:rgba(255,255,255,.15);padding:8px 20px;border-radius:8px;display:inline-block;letter-spacing:1px">${state.submittedApp.studentId}</div>
        </div>
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:24px">
          <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:16px">
            ⏱ <strong>Next Steps:</strong> Our admissions team will review within <strong>3–5 business days</strong>. You'll be contacted at <strong>${f.email}</strong>.
          </div>
          <a href="#" onclick="window.location.href=rootPath('index.html')" style="display:block;background:#123f7a;color:white;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none">← Back to Home</a>
        </div>
      </div>`;
    return;
  }

  // ── TYPE SELECTION ──
  if(!state.typeConfirmed){
    app.innerHTML=`
      <div style="max-width:640px;width:100%;margin:0 auto">
        <div style="text-align:center;margin-bottom:32px">
          <h1 style="font-size:32px;color:#001A4D;letter-spacing:1px;margin-bottom:8px">APPLICATION FOR ADMISSION</h1>
          <p style="color:#6b7280;font-size:15px">Please tell us about your application before we begin.</p>
        </div>
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:16px">Application Type <span style="color:#e8192c">*</span></div>
          <div style="display:flex;gap:14px;flex-wrap:wrap">
            ${[{v:'new',l:'🆕 New Student',d:'Applying to Richfield for the first time'},{v:'returning',l:'🔄 Returning Student',d:'Previously enrolled, continuing studies'},{v:'other',l:'📋 Other',d:'Transfer, re-admission or special cases'}].map(o=>`
            <div class="type-card ${state.appType===o.v?'selected':''}" onclick="setState({appType:'${o.v}'})">
              <div style="font-size:20px;margin-bottom:6px">${o.l.split(' ')[0]}</div>
              <div style="font-weight:700;font-size:14px;color:#001A4D">${o.l.split(' ').slice(1).join(' ')}</div>
              <div style="font-size:12px;color:#6b7280;margin-top:4px">${o.d}</div>
            </div>`).join('')}
          </div>
        </div>
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:16px">Admission Application For <span style="color:#e8192c">*</span></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            ${['1st Semester','2nd Semester','1st Year','2nd Year','3rd Year'].map(o=>`
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 14px;border:1.5px solid ${state.admissionFor===o?'#123f7a':'#e5e7eb'};border-radius:8px;background:${state.admissionFor===o?'#EEF2FF':'white'};transition:all .15s">
              <input type="radio" name="af" value="${o}" ${state.admissionFor===o?'checked':''} onchange="setState({admissionFor:'${o}',studyYear:${o.includes('2nd Year')?2:o.includes('3rd Year')?3:1}})" style="accent-color:#123f7a;width:16px;height:16px"/>
              <span style="font-weight:600;font-size:14px;color:#001A4D">${o}</span>
            </label>`).join('')}
          </div>
        </div>
        ${state.appType!=='returning'?`
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;margin-bottom:20px">
          <div style="font-weight:700;font-size:15px;color:#001A4D;margin-bottom:12px">Course Applied For</div>
          <select onchange="set('qualificationCode',this.value);set('qualificationName',QUALIFICATIONS.find(q=>q.code===this.value)?.name||'')" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;color:#001A4D;background:white">
            <option value="">Please Select</option>
            ${QUALIFICATIONS.map(q=>`<option value="${q.code}" ${f.qualificationCode===q.code?'selected':''}>${q.name}</option>`).join('')}
          </select>
        </div>`:''}
        <button onclick="confirmType()" style="width:100%;background:${state.appType?'#ffc72c':'#e5e7eb'};color:${state.appType?'#123f7a':'#9ca3af'};border:none;padding:14px;border-radius:8px;font-size:16px;font-weight:800;cursor:${state.appType?'pointer':'not-allowed'}">
          ${state.appType==='returning'?'Continue as Returning Student →':'Start New Application →'}
        </button>
      </div>`;
    return;
  }

  // ── RETURNING STUDENT FLOW ──
  if(state.appType==='returning'){
    const yr=admissionToYear(state.admissionFor);
    const qual=state.foundStudent?QUALIFICATIONS.find(q=>q.code===state.foundStudent.application.qualificationCode):null;
    const newMods=qual?qual.modules.filter(m=>m.year===yr):[];
    app.innerHTML=`
      <div style="max-width:700px;width:100%;margin:0 auto">
        <button onclick="setState({typeConfirmed:false,step:0,foundStudent:null,lookupValue:'',lookupError:''})" style="background:none;border:none;color:#123f7a;font-weight:600;cursor:pointer;font-size:14px;margin-bottom:20px">← Back to Type Selection</button>
        ${renderStepper(RETURNING_STEPS)}
        <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px">
          ${state.step===0?`
            <div class="form-section-header"><span style="font-size:22px">🔍</span><h3 style="font-weight:700;font-size:17px;color:#001A4D">Verify Your Identity</h3></div>
            <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:14px 16px;font-size:14px;color:#3730a3;margin-bottom:16px"><strong>Returning student?</strong> Enter your SA ID or passport number to retrieve your existing details.</div>
            <div class="form-group" style="margin-bottom:12px">
              <label class="form-label">SA ID Number or Passport Number <span class="required">*</span></label>
              <input value="${state.lookupValue}" oninput="state.lookupValue=this.value" onkeydown="if(event.key==='Enter')handleLookup()" placeholder="Enter your ID or passport number" style="width:100%;padding:10px 14px;border:1.5px solid ${state.lookupError?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px"/>
              ${state.lookupError?`<div style="color:#dc2626;font-size:12px;margin-top:4px">⚠ ${state.lookupError}</div>`:''}
            </div>
            <button onclick="handleLookup()" style="background:#123f7a;color:white;border:none;padding:12px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;width:100%">🔍 Find My Record</button>
          `:''}
          ${state.step===1&&state.foundStudent?`
            <div class="form-section-header"><span style="font-size:22px">✅</span><h3 style="font-weight:700;font-size:17px;color:#001A4D">Confirm Your Details</h3></div>
            <div style="background:#D1FAE5;border:1px solid #A7F3D0;border-radius:8px;padding:14px 18px;display:flex;gap:12px;margin-bottom:16px">
              <span style="font-size:20px">👋</span>
              <div><div style="font-weight:700;color:#065F46;font-size:15px">Welcome back, ${state.foundStudent.user.name}!</div>
              <div style="font-size:13px;color:#065F46">Student ID: <strong>${state.foundStudent.user.studentId||''}</strong></div>
              <div style="font-size:13px;color:#065F46">Applying for: <strong>${state.admissionFor}</strong></div></div>
            </div>
            <div class="form-row" style="margin-bottom:14px">
              <div class="form-group"><label class="form-label">First Name</label>${inp('firstName','First Name')}</div>
              <div class="form-group"><label class="form-label">Last Name</label>${inp('lastName','Last Name')}</div>
            </div>
            <div class="form-row" style="margin-bottom:14px">
              <div class="form-group"><label class="form-label">Phone <span class="required">*</span></label>${inp('phone','+27 XX XXX XXXX','tel')}${errSpan('phone')}</div>
              <div class="form-group"><label class="form-label">Email <span class="required">*</span></label>${inp('email','you@example.com','email')}${errSpan('email')}</div>
            </div>
            <div class="form-group"><label class="form-label">Residential Address</label>${inp('streetAddress','Street, Suburb, City')}</div>
          `:''}
          ${state.step===2&&state.foundStudent?`
            <div class="form-section-header"><span style="font-size:22px">📚</span><h3 style="font-weight:700;font-size:17px;color:#001A4D">Your New Modules</h3></div>
            <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:14px 16px;font-size:14px;color:#3730a3;margin-bottom:16px">
              Based on your <strong>${state.admissionFor}</strong> re-enrolment for <strong>${state.foundStudent.application.qualificationName}</strong>, here are your <strong>Year ${yr}</strong> modules:
            </div>
            ${newMods.length===0?'<div style="text-align:center;padding:32px;color:#6b7280"><div style="font-size:40px;margin-bottom:12px">📭</div>No modules found for this year. Please contact admissions.</div>'
            :[1,2].map(sem=>{const sm=newMods.filter(m=>m.semester===sem);if(!sm.length)return '';return `
              <div style="font-weight:700;font-size:14px;color:#123f7a;margin-bottom:10px;display:flex;align-items:center;gap:8px"><span style="background:#123f7a;color:white;padding:2px 10px;border-radius:99px;font-size:12px">Semester ${sem}</span></div>
              ${sm.map((m,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:#F4F6FB;border-radius:8px;border:1px solid #e5e7eb;margin-bottom:8px">
                <div style="width:30px;height:30px;background:#123f7a;border-radius:7px;color:white;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
                <div style="flex:1"><div style="font-weight:600;font-size:14px">${m.name}</div><div style="font-size:12px;color:#6b7280;font-family:monospace">${m.code}</div></div>
                <div style="text-align:right;flex-shrink:0"><div style="font-weight:700;font-size:14px;color:#123f7a">${m.credits}</div><div style="font-size:11px;color:#9ca3af">credits</div></div>
              </div>`).join('')}`;}).join('')}
          `:''}
          ${state.step===3&&state.foundStudent?`
            <div class="form-section-header"><span style="font-size:22px">✅</span><h3 style="font-weight:700;font-size:17px;color:#001A4D">Review & Submit</h3></div>
            ${renderReviewSection('Student Details',[['Name',f.firstName+' '+f.lastName],['Student ID',state.foundStudent.user.studentId||''],['Phone',f.phone],['Email',f.email]])}
            ${renderReviewSection('Re-enrolment',[['Qualification',f.qualificationName],['Applying For',state.admissionFor],['Study Year','Year '+yr],['New Modules',newMods.length+' modules']])}
            <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:12px">📧 A confirmation will be noted on your record.</div>
            <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;margin-bottom:8px">
              <input type="checkbox" ${f.tcAccepted?'checked':''} onchange="set('tcAccepted',this.checked)" style="width:16px;height:16px;margin-top:2px;accent-color:#123f7a;flex-shrink:0"/>
              <span style="font-size:13px;color:#6b7280;line-height:1.6">I confirm all details are correct and accept the <strong style="color:#123f7a">Terms and Conditions</strong>.</span>
            </label>
            ${errSpan('tcAccepted')}
          `:''}
          <div style="display:flex;justify-content:space-between;padding-top:20px;border-top:1px solid #e5e7eb;margin-top:12px">
            <button onclick="if(state.step>0)setState({step:state.step-1})" ${state.step===0?'disabled':''} style="background:#f3f4f6;color:#374151;border:1.5px solid #e5e7eb;padding:10px 22px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;opacity:${state.step===0?.5:1}">← Back</button>
            ${state.step<RETURNING_STEPS.length-1
              ?`<button onclick="if(validate())setState({step:state.step+1})" style="background:#123f7a;color:white;border:none;padding:10px 22px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer">Continue →</button>`
              :`<button onclick="handleSubmit()" style="background:#ffc72c;color:#123f7a;border:none;padding:12px 28px;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer">Submit Re-enrolment 🔄</button>`}
          </div>
        </div>
      </div>`;
    return;
  }

  // ── NEW/OTHER FULL FORM ──
  const docList = isForeign()
    ?['Certified copy of Passport (all pages)','Study permit / visa','Certified copy of highest qualification','Proof of payment / funding letter','Passport photo','SAQA evaluation letter']
    :['Certified copy of SA ID document','Certified copy of Matric certificate','Certified copy of tertiary qualifications','Proof of payment / funding letter','Passport photo'];

  app.innerHTML=`
    <div style="max-width:760px;width:100%;margin:0 auto">
      <button onclick="setState({typeConfirmed:false})" style="background:none;border:none;color:#123f7a;font-weight:600;cursor:pointer;font-size:14px;margin-bottom:8px">← Back to Type Selection</button>
      <h1 style="font-size:28px;color:#001A4D;letter-spacing:1px;margin-bottom:4px">ONLINE APPLICATION FORM</h1>
      <p style="font-size:14px;color:#6b7280;margin-bottom:24px">Complete all sections. Fields marked <span style="color:#e8192c">*</span> are required.</p>
      ${renderStepper(NEW_STEPS)}
      <div style="background:white;border-radius:12px;border:1px solid #e5e7eb;padding:28px;display:flex;flex-direction:column;gap:20px">
        ${state.step===0?renderPersonal():''}
        ${state.step===1?renderContact():''}
        ${state.step===2?renderEducation():''}
        ${state.step===3?renderQualification():''}
        ${state.step===4?renderDocuments(docList):''}
        ${state.step===5?renderReview():''}
        <div style="display:flex;justify-content:space-between;padding-top:16px;border-top:1px solid #e5e7eb;margin-top:8px">
          <button onclick="if(state.step>0)setState({step:state.step-1})" ${state.step===0?'disabled':''} style="background:#f3f4f6;color:#374151;border:1.5px solid #e5e7eb;padding:10px 22px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;opacity:${state.step===0?.5:1}">← Back</button>
          ${state.step<NEW_STEPS.length-1
            ?`<button onclick="if(validate())setState({step:state.step+1})" style="background:#123f7a;color:white;border:none;padding:10px 22px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer">Continue →</button>`
            :`<button onclick="handleSubmit()" style="background:#ffc72c;color:#123f7a;border:none;padding:12px 28px;border-radius:8px;font-weight:800;font-size:15px;cursor:pointer">Submit Application 🎓</button>`}
        </div>
      </div>
    </div>`;
}

function renderPersonal(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">👤</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Personal Details</h3></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">First Name <span class="required">*</span></label>${inp('firstName','John')}${errSpan('firstName')}</div>
    <div class="form-group"><label class="form-label">Last Name <span class="required">*</span></label>${inp('lastName','Doe')}${errSpan('lastName')}</div>
  </div>
  <div class="form-group"><label class="form-label">Nationality <span class="required">*</span></label>${selNat()}${errSpan('nationality')}</div>
  <div class="form-row">
    ${!isForeign()
      ?`<div class="form-group"><label class="form-label">SA ID Number <span class="required">*</span></label><input value="${f.idNumber}" oninput="set('idNumber',this.value)" maxlength="13" placeholder="0001015009087" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.idNumber?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px"/>
      ${errSpan('idNumber')}</div>`
      :`<div class="form-group"><label class="form-label">Passport Number <span class="required">*</span></label><input value="${f.passportNumber}" oninput="set('passportNumber',this.value.toUpperCase())" maxlength="20" placeholder="A12345678" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.passportNumber?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px"/>
      ${errSpan('passportNumber')}</div>`}
    <div class="form-group"><label class="form-label">Date of Birth <span class="required">*</span></label><input type="date" value="${f.dateOfBirth}" oninput="set('dateOfBirth',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.dateOfBirth?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px"/>
    ${errSpan('dateOfBirth')}</div>
  </div>
  <div class="form-group"><label class="form-label">Gender <span class="required">*</span></label>
    <select onchange="set('gender',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.gender?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px;background:white">
      <option value="">Select...</option>
      ${['Male','Female','Non-binary','Prefer not to say'].map(g=>`<option value="${g}" ${f.gender===g?'selected':''}>${g}</option>`).join('')}
    </select>${errSpan('gender')}</div>
  ${isForeign()?`<div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3">🌍 <strong>Foreign National:</strong> You'll need certified passport copy and valid study permit/visa.</div>`:''}`;
}

function renderContact(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">📞</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Contact Details</h3></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Phone <span class="required">*</span></label>${inp('phone','+27 XX XXX XXXX','tel')}${errSpan('phone')}</div>
    <div class="form-group"><label class="form-label">Email <span class="required">*</span></label>${inp('email','you@example.com','email')}${errSpan('email')}</div>
  </div>
  <div class="form-group"><label class="form-label">Alternative Email</label>${inp('altEmail','alt@example.com','email')}</div>
  <div class="form-section-header" style="margin-top:8px"><span style="font-size:20px">🏠</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Residential Address</h3></div>
  <div class="form-group"><label class="form-label">Street Address <span class="required">*</span></label>${inp('streetAddress','123 Main Street')}${errSpan('streetAddress')}</div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Suburb</label>${inp('suburb','Suburb')}</div>
    <div class="form-group"><label class="form-label">City <span class="required">*</span></label>${inp('city','City')}${errSpan('city')}</div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Province <span class="required">*</span></label>
      ${!isForeign()?`<select onchange="set('province',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.province?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px;background:white">
        <option value="">Select...</option>
        ${['Gauteng','Western Cape','KwaZulu-Natal','Eastern Cape','Limpopo','Mpumalanga','North West','Free State','Northern Cape'].map(p=>`<option value="${p}" ${f.province===p?'selected':''}>${p}</option>`).join('')}
      </select>`:inp('province','Province/Region')}
      ${errSpan('province')}</div>
    <div class="form-group"><label class="form-label">Postal Code</label>${inp('postalCode','0001')}</div>
  </div>`;
}

function renderEducation(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">🎓</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">High School Education</h3></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">High School Name <span class="required">*</span></label>${inp('highSchool','School name')}${errSpan('highSchool')}</div>
    <div class="form-group"><label class="form-label">Year Completed</label><input type="number" value="${f.highSchoolYear}" oninput="set('highSchoolYear',this.value)" placeholder="2023" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px"/></div>
  </div>
  <div class="form-group"><label class="form-label">Highest Grade / Qualification <span class="required">*</span></label>
    <select onchange="set('highestGrade',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid ${state.errors.highestGrade?'#dc2626':'#e5e7eb'};border-radius:8px;font-size:14px;background:white">
      <option value="">Select...</option>
      ${['Grade 12 / Matric','Grade 11','GED','N3',isForeign()?'Foreign equivalent':''].filter(Boolean).map(g=>`<option value="${g}" ${f.highestGrade===g?'selected':''}>${g}</option>`).join('')}
    </select>${errSpan('highestGrade')}</div>
  <div class="form-section-header" style="margin-top:8px"><span style="font-size:20px">🏛️</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Tertiary Education (if applicable)</h3></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Institution</label>${inp('tertiaryInstitution','Institution name')}</div>
    <div class="form-group"><label class="form-label">Qualification</label>${inp('tertiaryQualification','Qualification name')}</div>
  </div>`;
}

function renderQualification(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">📚</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Qualification Selection</h3></div>
  ${QUALIFICATIONS.map(q=>`<div class="qual-card ${f.qualificationCode===q.code?'selected':''}" onclick="set('qualificationCode','${q.code}');set('qualificationName','${q.name.replace(/'/g,"\\'")}')">
    <div style="display:flex;justify-content:space-between">
      <div><span style="font-family:monospace;font-size:12px;color:#123f7a;font-weight:700">${q.code}</span><div style="font-weight:600;margin-top:2px">${q.name}</div><div style="font-size:13px;color:#6b7280">${q.faculty} · ${q.duration}</div></div>
      <div style="text-align:right"><div style="font-weight:700;color:#123f7a">R${q.fee.toLocaleString()}</div><div style="font-size:12px;color:#6b7280">per year</div></div>
    </div>
  </div>`).join('')}
  ${errSpan('qualificationCode')}
  <div class="form-section-header" style="margin-top:8px"><span style="font-size:20px">💳</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Account Payer Details</h3></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Payer Full Name <span class="required">*</span></label>${inp('payerName','Full name')}${errSpan('payerName')}</div>
    <div class="form-group"><label class="form-label">Relationship</label>
      <select onchange="set('payerRelation',this.value)" style="width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;background:white">
        <option value="">Select...</option>
        ${['Self','Parent','Guardian','Sponsor','Employer'].map(r=>`<option value="${r}" ${f.payerRelation===r?'selected':''}>${r}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Payer Phone <span class="required">*</span></label>${inp('payerPhone','+27 XX XXX XXXX','tel')}${errSpan('payerPhone')}</div>
    <div class="form-group"><label class="form-label">Payer Email</label>${inp('payerEmail','payer@example.com','email')}</div>
  </div>`;
}

function renderDocuments(docList){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">📎</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Required Documents</h3></div>
  ${isForeign()?`<div style="background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:13px 16px;font-size:14px;color:#92400e;margin-bottom:10px">🌍 As a foreign national, additional documents are required.</div>`:''}
  ${docList.map(doc=>`
  <label style="display:flex;align-items:center;gap:12px;border:1.5px solid ${f.docsUploaded.includes(doc)?'#123f7a':'#e5e7eb'};border-radius:8px;padding:12px 16px;cursor:pointer;background:${f.docsUploaded.includes(doc)?'#EEF2FF':'white'};transition:all .15s;margin-bottom:8px">
    <input type="checkbox" ${f.docsUploaded.includes(doc)?'checked':''} onchange="toggleDoc('${doc.replace(/'/g,"\\'")}')" style="width:16px;height:16px;accent-color:#123f7a"/>
    <span style="font-size:14px;font-weight:500">${doc}</span>
    ${f.docsUploaded.includes(doc)?'<span style="margin-left:auto;color:#059669;font-weight:700;font-size:13px">✓</span>':''}
  </label>`).join('')}`;
}

function renderReview(){
  const f=state.form;
  return `<div class="form-section-header"><span style="font-size:20px">✅</span><h3 style="font-weight:700;font-size:16px;color:#001A4D">Review Your Application</h3></div>
  ${renderReviewSection('Personal',[['Name',f.firstName+' '+f.lastName],['Nationality',f.nationality],[isForeign()?'Passport':'SA ID',isForeign()?f.passportNumber:f.idNumber],['DOB',f.dateOfBirth],['Gender',f.gender]])}
  ${renderReviewSection('Contact',[['Phone',f.phone],['Email',f.email],['Address',f.streetAddress+', '+f.city+', '+f.province]])}
  ${renderReviewSection('Education',[['High School',f.highSchool],['Grade',f.highestGrade]])}
  ${renderReviewSection('Qualification',[['Code',f.qualificationCode],['Name',f.qualificationName],['Payer',f.payerName],['Admission For',state.admissionFor]])}
  <div style="background:#EEF2FF;border:1px solid #C7D2FE;border-radius:8px;padding:13px 16px;font-size:14px;color:#3730a3;margin-bottom:12px">📧 A confirmation will be noted upon submission.</div>
  <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer;margin-bottom:8px">
    <input type="checkbox" ${f.tcAccepted?'checked':''} onchange="set('tcAccepted',this.checked)" style="width:16px;height:16px;margin-top:2px;accent-color:#123f7a;flex-shrink:0"/>
    <span style="font-size:13px;color:#6b7280;line-height:1.6">I confirm all information is accurate and accept the <strong style="color:#123f7a">Terms and Conditions</strong>.</span>
  </label>
  ${errSpan('tcAccepted')}`;
}

function renderReviewSection(title,rows){
  return `<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:12px">
    <div style="background:#f9fafb;padding:9px 14px;font-weight:700;font-size:13px;border-bottom:1px solid #e5e7eb">${title}</div>
    <div style="padding:12px 14px;display:flex;flex-direction:column;gap:8px">
      ${rows.map(([k,v])=>`<div style="display:flex;gap:12px;font-size:13px"><span style="color:#6b7280;min-width:130px">${k}</span><span style="font-weight:600;color:#001A4D">${v||'—'}</span></div>`).join('')}
    </div>
  </div>`;
}

function confirmType(){
  if(!state.appType){showToast('Please select an Application Type','error');return;}
  if(!state.admissionFor){showToast('Please select what you are applying for','error');return;}
  setState({typeConfirmed:true,step:0});
}

renderNavbar('apply');
render();
</script>
</body>
</html>
