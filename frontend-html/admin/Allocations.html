<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Allocate Modules — Admin — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content" id="page-body">
    <div style="text-align:center;padding:60px"><div style="font-size:32px">⏳</div></div>
  </div>
  <div id="_toast" class="toast hidden"></div>

  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('admin');
    let step = 'list'; // 'list' | 'allocate'
    let selectedApp = null;
    let studyYear = 1, semester = 1;
    let pickedModules = [];
    let searchQ = '';
    let saving = false;
    let justAllocated = null;

    if (user) { (async()=>{ await renderNavbar('allocations'); await renderListStep(); })(); }

    function getStudentAllocs(studentId) {
      return (await getRegistrations()).filter(r => r.studentId === studentId && r.status === 'allocated');
    }
    function getExistingAlloc(studentId, sem, yr) {
      return (await getRegistrations()).find(r => r.studentId === studentId && r.semester === sem && r.studyYear === yr && r.status === 'allocated');
    }

    // ── STEP 1: LIST ────────────────────────────────────────
    async function renderListStep() {
      step = 'list';
      const apps = await getApplications();
      // Only approved non-returning (matches React: applicationType !== 'returning')
      const approvedApps = apps.filter(a => a.status === 'approved' && a.applicationType !== 'returning');
      const filtered = approvedApps.filter(a => {
        if (!searchQ) return true;
        const q = searchQ.toLowerCase();
        return `${a.firstName} ${a.lastName} ${a.studentId} ${a.qualificationName} ${a.email}`.toLowerCase().includes(q);
      });

      const allocated = new Set((await getRegistrations()).filter(r => r.status==='allocated').map(r => r.studentId)).size;
      const awaiting = approvedApps.filter(a => getStudentAllocs(a.studentId).length === 0).length;

      document.getElementById('page-body').innerHTML = `
        <h1 class="section-title">ALLOCATE MODULES</h1>
        <p class="section-subtitle">Select an approved student to allocate their modules for the semester</p>

        <!-- Stats -->
        <div class="grid-3 mb-24">
          ${[
            { label:'Approved Students',   value:approvedApps.length, icon:'🎓', color:'#123f7a' },
            { label:'Already Allocated',   value:allocated,           icon:'✅', color:'#059669' },
            { label:'Awaiting Allocation', value:awaiting,            icon:'⏳', color:'#d97706' },
          ].map(s => `
            <div style="background:white;border-radius:10px;padding:18px 20px;border:1px solid var(--rf-border);display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm)">
              <div style="font-size:28px">${s.icon}</div>
              <div><div style="font-size:28px;font-weight:900;color:${s.color};line-height:1">${s.value}</div><div style="font-size:12px;color:var(--rf-gray);margin-top:3px">${s.label}</div></div>
            </div>`).join('')}
        </div>

        <!-- Search -->
        <div style="margin-bottom:16px">
          <input id="search-input" value="${searchQ}" oninput="searchQ=this.value;renderListStep()"
            placeholder="🔍  Search by name, student ID, qualification or email..."
            style="width:100%;padding:11px 16px;border:1.5px solid var(--rf-border);border-radius:8px;font-size:14px;background:white">
        </div>

        <!-- Table -->
        <div class="card" style="padding:0;overflow:hidden">
          ${filtered.length === 0 ? `
            <div style="padding:48px;text-align:center;color:var(--rf-gray)">
              <div style="font-size:40px;margin-bottom:12px">🎓</div>
              <div style="font-weight:600">No approved students found</div>
              <div style="font-size:13px;margin-top:6px">Students appear here once their application is approved</div>
            </div>` : `
            <table class="data-table">
              <thead><tr><th>Student</th><th>Student ID</th><th>Qualification</th><th>Study Year</th><th>Allocation Status</th><th>Action</th></tr></thead>
              <tbody>
                ${filtered.map(a => {
                  const allocs = getStudentAllocs(a.studentId);
                  return `
                    <tr style="background:${justAllocated===a.studentId?'#F0FDF4':''}">
                      <td>
                        <div style="font-weight:600">${a.firstName} ${a.lastName}</div>
                        <div style="font-size:12px;color:var(--rf-gray)">${a.email}</div>
                      </td>
                      <td style="font-family:monospace;font-size:12px;color:#123f7a;font-weight:700">${a.studentId}</td>
                      <td>
                        <div style="font-weight:600;font-size:13px">${a.qualificationCode}</div>
                        <div style="font-size:12px;color:var(--rf-gray)">${a.qualificationName}</div>
                      </td>
                      <td><span style="font-weight:700;font-size:14px;color:#123f7a">Year ${a.studyYear}</span></td>
                      <td>
                        ${allocs.length > 0
                          ? allocs.map(r => `<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;background:#D1FAE5;color:#065f46;display:inline-block;margin-bottom:2px">✅ Y${r.studyYear} Sem ${r.semester} · ${r.modules.length} modules</span>`).join('<br>')
                          : `<span style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;background:#FEF3C7;color:#92400e">⏳ Not yet allocated</span>`}
                      </td>
                      <td>
                        <button onclick="openAllocateStep('${a.id}')"
                          style="background:#123f7a;color:white;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">
                          ${allocs.length>0?'✏️ Edit / Add':'📚 Allocate'}
                        </button>
                      </td>
                    </tr>`;
                }).join('')}
              </tbody>
            </table>`}
        </div>`;
    }

    // ── STEP 2: ALLOCATE ────────────────────────────────────
    function openAllocateStep(appId) {
      const apps = await getApplications();
      selectedApp = apps.find(a => a.id === appId);
      if (!selectedApp) return;
      studyYear = selectedApp.studyYear || 1;
      semester = 1;
      pickedModules = [];
      renderAllocateStep();
    }

    async function renderAllocateStep() {
      step = 'allocate';
      const qual = QUALIFICATIONS.find(q => q.code === selectedApp.qualificationCode);
      const maxYear = qual?.duration?.startsWith('1') ? 1 : qual?.duration?.startsWith('2') ? 2 : 3;
      const availMods = qual ? qual.modules.filter(m => m.year === studyYear && m.semester === semester) : [];
      const existingAlloc = getExistingAlloc(selectedApp.studentId, semester, studyYear);
      const allStudentAllocs = getStudentAllocs(selectedApp.studentId);
      const totalCredits = pickedModules.reduce((s,m) => s+m.credits, 0);

      document.getElementById('page-body').innerHTML = `
        <!-- Breadcrumb -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:14px">
          <button onclick="renderListStep()" style="background:none;border:none;color:#123f7a;font-weight:600;cursor:pointer;padding:0">← Allocate Modules</button>
          <span style="color:#9ca3af">›</span>
          <span style="color:#374151;font-weight:600">${selectedApp.firstName} ${selectedApp.lastName}</span>
        </div>

        <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">

          <!-- LEFT -->
          <div style="display:flex;flex-direction:column;gap:16px">

            <!-- Student banner -->
            <div style="background:linear-gradient(135deg,var(--rf-navy),#123f7a);color:white;border-radius:12px;padding:20px 24px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
                <div>
                  <div style="font-size:11px;opacity:.6;letter-spacing:1px;margin-bottom:4px">ALLOCATING MODULES FOR</div>
                  <div style="font-weight:800;font-size:20px">${selectedApp.firstName} ${selectedApp.lastName}</div>
                  <div style="font-size:13px;opacity:.75;margin-top:4px;font-family:monospace">${selectedApp.studentId}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-weight:700;font-size:15px">${selectedApp.qualificationName}</div>
                  <div style="font-size:12px;opacity:.7;margin-top:2px">${qual?.faculty||''}</div>
                </div>
              </div>
            </div>

            <!-- Period selector -->
            <div style="background:white;border-radius:10px;border:1px solid var(--rf-border);padding:20px 24px">
              <div style="font-weight:700;font-size:14px;color:var(--rf-navy);margin-bottom:14px">Select Period</div>
              <div class="form-row">
                <div>
                  <label style="font-size:12px;font-weight:600;color:var(--rf-gray);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Study Year</label>
                  <div style="display:flex;gap:8px" id="year-btns"></div>
                </div>
                <div>
                  <label style="font-size:12px;font-weight:600;color:var(--rf-gray);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Semester</label>
                  <div style="display:flex;gap:8px" id="sem-btns"></div>
                </div>
              </div>
              ${existingAlloc ? `
                <div style="margin-top:14px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:11px 14px;font-size:13px;color:#92400e;display:flex;gap:8px">
                  <span>⚠️</span>
                  <div><strong>Existing allocation found</strong> for Year ${studyYear}, Semester ${semester} (${existingAlloc.modules.length} modules). Saving will <strong>replace</strong> it.</div>
                </div>` : ''}
            </div>

            <!-- Module selection -->
            <div style="background:white;border-radius:10px;border:1px solid var(--rf-border);overflow:hidden">
              <div style="padding:16px 20px;border-bottom:1px solid var(--rf-border);display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div style="font-weight:700;font-size:15px;color:var(--rf-navy)">${qual?.name||''} — Year ${studyYear}, Semester ${semester}</div>
                  <div style="font-size:13px;color:var(--rf-gray);margin-top:2px">${availMods.length} modules available · ${pickedModules.length} selected</div>
                </div>
                <div style="display:flex;gap:8px">
                  <button onclick="selectAll()" style="background:#EEF2FF;color:#3730a3;border:1px solid #C7D2FE;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Select All</button>
                  <button onclick="clearAll()" style="background:var(--rf-offwhite);color:#374151;border:1px solid var(--rf-border);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Clear</button>
                </div>
              </div>

              ${availMods.length === 0 ? `
                <div style="padding:36px;text-align:center;color:var(--rf-gray)">
                  <div style="font-size:36px;margin-bottom:12px">📭</div>
                  <div>No modules defined for Year ${studyYear}, Semester ${semester}</div>
                </div>` : `
                <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px" id="mod-list">
                  ${availMods.map((m,i) => {
                    const picked = pickedModules.find(p => p.code===m.code);
                    return `
                      <div onclick="toggleMod('${m.code}')" style="display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:8px;cursor:pointer;border:2px solid ${picked?'#123f7a':'#e5e7eb'};background:${picked?'#EEF2FF':'#fafafa'};transition:all .12s">
                        <div style="width:22px;height:22px;border-radius:5px;border:2px solid ${picked?'#123f7a':'#d1d5db'};background:${picked?'#123f7a':'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center">
                          ${picked?'<span style="color:white;font-size:13px;font-weight:700">✓</span>':''}
                        </div>
                        <div style="width:28px;height:28px;background:${picked?'#123f7a':'#e5e7eb'};border-radius:6px;color:${picked?'white':'#6b7280'};font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
                        <div style="flex:1">
                          <div style="font-weight:600;font-size:14px;color:${picked?'var(--rf-navy)':'#374151'}">${m.name}</div>
                          <div style="font-size:12px;color:var(--rf-gray);font-family:monospace;margin-top:2px">${m.code}</div>
                        </div>
                        <div style="text-align:right;flex-shrink:0">
                          <div style="font-weight:700;font-size:14px;color:${picked?'#123f7a':'var(--rf-gray)'}">${m.credits}</div>
                          <div style="font-size:11px;color:var(--rf-gray)">credits</div>
                        </div>
                      </div>`;
                  }).join('')}
                </div>`}
            </div>
          </div>

          <!-- RIGHT: Summary sidebar -->
          <div style="display:flex;flex-direction:column;gap:16px;position:sticky;top:80px">
            <div style="background:white;border-radius:10px;border:1px solid var(--rf-border);overflow:hidden;box-shadow:var(--shadow-sm)">
              <div style="background:var(--rf-navy);color:white;padding:14px 18px;font-weight:700;font-size:14px">📋 Allocation Summary</div>
              <div style="padding:16px 18px">
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px">
                  <span style="color:var(--rf-gray)">Period</span>
                  <span style="font-weight:700;color:var(--rf-navy)">Year ${studyYear}, Sem ${semester}</span>
                </div>
                <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px">
                  <span style="color:var(--rf-gray)">Modules Selected</span>
                  <span style="font-weight:700;color:${pickedModules.length>0?'#059669':'#9ca3af'};font-size:18px">${pickedModules.length}</span>
                </div>
                <div style="display:flex;justify-content:space-between;margin-bottom:16px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px">
                  <span style="color:var(--rf-gray)">Total Credits</span>
                  <span style="font-weight:700;color:#123f7a;font-size:18px">${totalCredits}</span>
                </div>
                ${pickedModules.length > 0 ? `
                  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
                    ${pickedModules.map(m => `
                      <div style="display:flex;justify-content:space-between;align-items:center;background:var(--rf-offwhite);border-radius:6px;padding:7px 10px;font-size:12px">
                        <span style="font-weight:600;color:var(--rf-navy);flex:1">${m.name}</span>
                        <span style="color:var(--rf-gray);font-family:monospace;margin-left:8px;flex-shrink:0">${m.credits}cr</span>
                      </div>`).join('')}
                  </div>` : ''}
                <button onclick="handleAllocate()" id="alloc-btn"
                  style="width:100%;padding:13px;border-radius:8px;border:none;background:${pickedModules.length>0?'#ffc72c':'#e5e7eb'};color:${pickedModules.length>0?'#123f7a':'#9ca3af'};font-weight:800;font-size:15px;cursor:${pickedModules.length>0?'pointer':'not-allowed'};transition:all .15s">
                  ${saving?'⏳ Saving...':pickedModules.length===0?'Select modules above':`✅ Allocate ${pickedModules.length} Module${pickedModules.length>1?'s':''}`}
                </button>
                ${pickedModules.length>0?`<div style="margin-top:10px;font-size:12px;color:var(--rf-gray);text-align:center;line-height:1.5">Student will be notified immediately via their portal</div>`:''}
              </div>
            </div>

            ${allStudentAllocs.length>0?`
              <div style="background:white;border-radius:10px;border:1px solid var(--rf-border);overflow:hidden">
                <div style="background:var(--rf-offwhite);border-bottom:1px solid var(--rf-border);padding:12px 18px;font-weight:700;font-size:13px;color:var(--rf-navy)">📚 Previous Allocations</div>
                <div style="padding:12px 16px;display:flex;flex-direction:column;gap:8px">
                  ${allStudentAllocs.map(r => `
                    <div style="border:1px solid var(--rf-border);border-radius:8px;overflow:hidden">
                      <div style="background:#059669;color:white;padding:6px 12px;font-size:12px;font-weight:700;display:flex;justify-content:space-between">
                        <span>Year ${r.studyYear}, Sem ${r.semester}</span>
                        <span>${r.modules.length} modules</span>
                      </div>
                      <div style="padding:8px 12px;display:flex;flex-direction:column;gap:4px">
                        ${r.modules.map(m => `
                          <div style="font-size:12px;color:#374151;display:flex;justify-content:space-between">
                            <span>${m.name}</span>
                            <span style="color:var(--rf-gray);font-family:monospace">${m.credits}cr</span>
                          </div>`).join('')}
                      </div>
                    </div>`).join('')}
                </div>
              </div>` : ''}
          </div>
        </div>`;

      // Render year/sem buttons after DOM is ready
      renderPeriodBtns(maxYear);
    }

    function renderPeriodBtns(maxYear) {
      const yb = document.getElementById('year-btns');
      const sb = document.getElementById('sem-btns');
      if (yb) yb.innerHTML = [1,2,3].slice(0,maxYear).map(y => `
        <button onclick="setYear(${y})" style="flex:1;padding:9px 0;border-radius:7px;border:2px solid ${studyYear===y?'#123f7a':'#e5e7eb'};background:${studyYear===y?'#123f7a':'white'};color:${studyYear===y?'white':'#374151'};font-weight:700;font-size:14px;cursor:pointer">Year ${y}</button>`).join('');
      if (sb) sb.innerHTML = [1,2].map(s => `
        <button onclick="setSem(${s})" style="flex:1;padding:9px 0;border-radius:7px;border:2px solid ${semester===s?'#123f7a':'#e5e7eb'};background:${semester===s?'#123f7a':'white'};color:${semester===s?'white':'#374151'};font-weight:700;font-size:14px;cursor:pointer">Sem ${s}</button>`).join('');
    }

    function setYear(y) { studyYear=y; pickedModules=[]; renderAllocateStep(); }
    function setSem(s)  { semester=s;  pickedModules=[]; renderAllocateStep(); }

    function getAvailMods() {
      const qual = QUALIFICATIONS.find(q => q.code === selectedApp.qualificationCode);
      return qual ? qual.modules.filter(m => m.year===studyYear && m.semester===semester) : [];
    }

    function toggleMod(code) {
      const mod = getAvailMods().find(m => m.code === code);
      if (!mod) return;
      const idx = pickedModules.findIndex(m => m.code === code);
      if (idx >= 0) pickedModules.splice(idx, 1);
      else pickedModules.push(mod);
      renderAllocateStep();
    }

    function selectAll() { pickedModules = [...getAvailMods()]; renderAllocateStep(); }
    function clearAll()  { pickedModules = []; renderAllocateStep(); }

    function handleAllocate() {
      if (pickedModules.length === 0 || saving) return;
      saving = true;
      await allocateModules(selectedApp.id, pickedModules, semester, studyYear);
      justAllocated = selectedApp.studentId;
      showToast(`✅ ${pickedModules.length} modules allocated to ${selectedApp.firstName} ${selectedApp.lastName}`, 'success');
      pickedModules = [];
      saving = false;
      renderAllocateStep();
    }
  </script>
</body>
</html>
