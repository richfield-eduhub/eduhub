<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Allocate Modules — EduHub Admin</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>
    .module-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:8px;cursor:pointer;border:2px solid #e5e7eb;background:#fafafa;transition:all .12s;margin-bottom:8px}
    .module-row.picked{border-color:#123f7a;background:#EEF2FF}
    .chk{width:22px;height:22px;border-radius:5px;border:2px solid #d1d5db;background:white;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;font-size:13px;font-weight:700}
    .module-row.picked .chk{background:#123f7a;border-color:#123f7a;color:white}
    .num-badge{width:28px;height:28px;background:#e5e7eb;border-radius:6px;color:#6b7280;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .module-row.picked .num-badge{background:#123f7a;color:white}
  </style>
</head>
<body>
<div id="navbar-root"></div>
<div id="app" class="main-content"></div>
<script src="../shared-local.js"></script>
<script>
requireAuth('admin');
renderNavbar('admin-alloc');

let step='select_student'; // 'select_student' | 'allocate'
let selectedApp=null;
let semester=1, studyYear=1;
let pickedModules=[];
let search='';
let justAllocated=null;

function render(){
  const apps=getApplications();
  const regs=getRegistrations();
  const approvedApps=apps.filter(a=>a.status==='approved'&&a.applicationType!=='returning');
  const allocatedSet=new Set(regs.filter(r=>r.status==='allocated').map(r=>r.studentId));
  const awaitingCount=approvedApps.filter(a=>!regs.some(r=>r.studentId===a.studentId&&r.status==='allocated')).length;

  if(step==='select_student'){
    const q=search.toLowerCase();
    const filtered=search?approvedApps.filter(a=>`${a.firstName} ${a.lastName}`.toLowerCase().includes(q)||a.studentId.toLowerCase().includes(q)||a.qualificationName.toLowerCase().includes(q)||a.email.toLowerCase().includes(q)):approvedApps;
    document.getElementById('app').innerHTML=`
      <h1 class="section-title">ALLOCATE MODULES</h1>
      <p class="section-subtitle">Select an approved student to allocate their modules for the semester</p>
      <div class="grid-3 mb-24">
        ${[{label:'Approved Students',value:approvedApps.length,icon:'🎓',color:'#123f7a'},{label:'Already Allocated',value:allocatedSet.size,icon:'✅',color:'#059669'},{label:'Awaiting Allocation',value:awaitingCount,icon:'⏳',color:'#d97706'}].map(s=>`
        <div style="background:white;border-radius:10px;padding:18px 20px;border:1px solid #e5e7eb;display:flex;align-items:center;gap:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)">
          <div style="font-size:28px">${s.icon}</div>
          <div><div style="font-size:28px;font-weight:900;color:${s.color};line-height:1">${s.value}</div><div style="font-size:12px;color:#6b7280;margin-top:3px">${s.label}</div></div>
        </div>`).join('')}
      </div>
      <div style="margin-bottom:16px">
        <input value="${search}" oninput="search=this.value;render()" placeholder="🔍  Search by name, student ID, qualification or email..." style="width:100%;padding:11px 16px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;background:white;box-sizing:border-box"/>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        ${filtered.length===0?`<div style="padding:48px;text-align:center;color:#6b7280"><div style="font-size:40px;margin-bottom:12px">🎓</div><div style="font-weight:600">No approved students found</div><div style="font-size:13px;margin-top:6px">Students appear here once their application is approved</div></div>`:
        `<table class="data-table"><thead><tr><th>Student</th><th>Student ID</th><th>Qualification</th><th>Study Year</th><th>Allocation Status</th><th>Action</th></tr></thead><tbody>
        ${filtered.map(a=>{
          const allocs=regs.filter(r=>r.studentId===a.studentId&&r.status==='allocated');
          const hasAlloc=allocs.length>0;
          return `<tr style="background:${justAllocated===a.studentId?'#F0FDF4':''}">
            <td><div style="font-weight:600">${a.firstName} ${a.lastName}</div><div style="font-size:12px;color:#6b7280">${a.email}</div></td>
            <td style="font-family:var(--font-mono);font-size:12px;color:#123f7a;font-weight:700">${a.studentId}</td>
            <td><div style="font-weight:600;font-size:13px">${a.qualificationCode}</div><div style="font-size:12px;color:#6b7280">${a.qualificationName}</div></td>
            <td><span style="font-weight:700;font-size:14px;color:#123f7a">Year ${a.studyYear}</span></td>
            <td>${hasAlloc?allocs.map(r=>`<span style="font-size:11px;font-weight:700;padding:3px 8px;border-radius:99px;background:#D1FAE5;color:#065f46;display:inline-block;margin-bottom:3px">✅ Y${r.studyYear} Sem ${r.semester} · ${r.modules.length} modules</span>`).join(''):`<span style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:99px;background:#FEF3C7;color:#92400e">⏳ Not yet allocated</span>`}</td>
            <td><button onclick="openStudent('${a.id}')" style="background:#123f7a;color:white;border:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer">${hasAlloc?'✏️ Edit / Add':'📚 Allocate'}</button></td>
          </tr>`;
        }).join('')}
        </tbody></table>`}
      </div>`;
    return;
  }

  // ── STEP 2: ALLOCATE ──
  if(!selectedApp)return;
  const qual=QUALIFICATIONS.find(q=>q.code===selectedApp.qualificationCode);
  const availMods=qual?qual.modules.filter(m=>m.year===studyYear&&m.semester===semester):[];
  const allStudentAllocs=regs.filter(r=>r.studentId===selectedApp.studentId&&r.status==='allocated');
  const existingAlloc=regs.find(r=>r.studentId===selectedApp.studentId&&r.studyYear===studyYear&&r.semester===semester&&r.status==='allocated');
  const totalCredits=pickedModules.reduce((s,m)=>s+m.credits,0);
  const qualDur=qual?.duration||'';
  const maxYear=qualDur.startsWith('1')?1:qualDur.startsWith('2')?2:3;

  document.getElementById('app').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:14px">
      <button onclick="step='select_student';selectedApp=null;pickedModules=[];render()" style="background:none;border:none;color:#123f7a;font-weight:600;cursor:pointer;padding:0">← Allocate Modules</button>
      <span style="color:#9ca3af">›</span>
      <span style="color:#374151;font-weight:600">${selectedApp.firstName} ${selectedApp.lastName}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start">
      <div style="display:flex;flex-direction:column;gap:16px">
        <!-- Student banner -->
        <div style="background:linear-gradient(135deg,#001A4D,#123f7a);color:white;border-radius:12px;padding:20px 24px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
            <div><div style="font-size:11px;opacity:.6;letter-spacing:1px;margin-bottom:4px">ALLOCATING MODULES FOR</div>
              <div style="font-weight:800;font-size:20px">${selectedApp.firstName} ${selectedApp.lastName}</div>
              <div style="font-size:13px;opacity:.75;margin-top:4px;font-family:monospace">${selectedApp.studentId}</div></div>
            <div style="text-align:right"><div style="font-weight:700;font-size:15px">${selectedApp.qualificationName}</div><div style="font-size:12px;opacity:.7;margin-top:2px">${qual?.faculty||''}</div></div>
          </div>
        </div>
        <!-- Year + Semester -->
        <div style="background:white;border-radius:10px;border:1px solid #e5e7eb;padding:20px 24px">
          <div style="font-weight:700;font-size:14px;color:#001A4D;margin-bottom:14px">Select Period</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div>
              <label style="font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Study Year</label>
              <div style="display:flex;gap:8px">
                ${[1,2,3].slice(0,maxYear).map(y=>`<button onclick="studyYear=${y};pickedModules=[];render()" style="flex:1;padding:9px 0;border-radius:7px;border:2px solid ${studyYear===y?'#123f7a':'#e5e7eb'};background:${studyYear===y?'#123f7a':'white'};color:${studyYear===y?'white':'#374151'};font-weight:700;font-size:14px;cursor:pointer">Year ${y}</button>`).join('')}
              </div>
            </div>
            <div>
              <label style="font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Semester</label>
              <div style="display:flex;gap:8px">
                ${[1,2].map(s=>`<button onclick="semester=${s};pickedModules=[];render()" style="flex:1;padding:9px 0;border-radius:7px;border:2px solid ${semester===s?'#123f7a':'#e5e7eb'};background:${semester===s?'#123f7a':'white'};color:${semester===s?'white':'#374151'};font-weight:700;font-size:14px;cursor:pointer">Sem ${s}</button>`).join('')}
              </div>
            </div>
          </div>
          ${existingAlloc?`<div style="margin-top:14px;background:#FEF3C7;border:1px solid #FDE68A;border-radius:8px;padding:11px 14px;font-size:13px;color:#92400e;display:flex;gap:8px"><span>⚠️</span><div><strong>Existing allocation found</strong> for Year ${studyYear}, Semester ${semester} (${existingAlloc.modules.length} modules). Saving will <strong>replace</strong> it.</div></div>`:''}
        </div>
        <!-- Module selection -->
        <div style="background:white;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden">
          <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-weight:700;font-size:15px;color:#001A4D">${qual?.name||''} — Year ${studyYear}, Semester ${semester}</div>
              <div style="font-size:13px;color:#6b7280;margin-top:2px">${availMods.length} modules available · ${pickedModules.length} selected</div></div>
            <div style="display:flex;gap:8px">
              <button onclick="pickedModules=[...availMods];render()" style="background:#EEF2FF;color:#3730a3;border:1px solid #C7D2FE;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Select All</button>
              <button onclick="pickedModules=[];render()" style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Clear</button>
            </div>
          </div>
          ${availMods.length===0?`<div style="padding:36px;text-align:center;color:#6b7280"><div style="font-size:36px;margin-bottom:12px">📭</div><div>No modules defined for Year ${studyYear}, Semester ${semester}</div></div>`:
          `<div style="padding:12px 16px">
            ${availMods.map((m,i)=>{const picked=pickedModules.some(p=>p.code===m.code);return `
            <div class="module-row ${picked?'picked':''}" onclick="toggleModule('${m.code}')">
              <div class="chk">${picked?'✓':''}</div>
              <div class="num-badge">${i+1}</div>
              <div style="flex:1"><div style="font-weight:600;font-size:14px;color:${picked?'#001A4D':'#374151'}">${m.name}</div><div style="font-size:12px;color:#6b7280;font-family:monospace;margin-top:2px">${m.code}</div></div>
              <div style="text-align:right;flex-shrink:0"><div style="font-weight:700;font-size:14px;color:${picked?'#123f7a':'#6b7280'}">${m.credits}</div><div style="font-size:11px;color:#9ca3af">credits</div></div>
            </div>`}).join('')}
          </div>`}
        </div>
      </div>
      <!-- RIGHT SIDEBAR -->
      <div style="display:flex;flex-direction:column;gap:16px;position:sticky;top:80px">
        <div style="background:white;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)">
          <div style="background:#001A4D;color:white;padding:14px 18px;font-weight:700;font-size:14px">📋 Allocation Summary</div>
          <div style="padding:16px 18px">
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px"><span style="color:#6b7280">Period</span><span style="font-weight:700;color:#001A4D">Year ${studyYear}, Sem ${semester}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:12px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px"><span style="color:#6b7280">Modules Selected</span><span style="font-weight:700;color:${pickedModules.length>0?'#059669':'#9ca3af'};font-size:18px">${pickedModules.length}</span></div>
            <div style="display:flex;justify-content:space-between;margin-bottom:16px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px"><span style="color:#6b7280">Total Credits</span><span style="font-weight:700;color:#123f7a;font-size:18px">${totalCredits}</span></div>
            ${pickedModules.length>0?`<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">
              ${pickedModules.map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;background:#F4F6FB;border-radius:6px;padding:7px 10px;font-size:12px"><span style="font-weight:600;color:#001A4D;flex:1">${m.name}</span><span style="color:#6b7280;font-family:monospace;margin-left:8px;flex-shrink:0">${m.credits}cr</span></div>`).join('')}
            </div>`:''}
            <button onclick="handleAllocate()" ${pickedModules.length===0?'disabled':''} style="width:100%;padding:13px;border-radius:8px;border:none;background:${pickedModules.length>0?'#ffc72c':'#e5e7eb'};color:${pickedModules.length>0?'#123f7a':'#9ca3af'};font-weight:800;font-size:15px;cursor:${pickedModules.length>0?'pointer':'not-allowed'}">
              ${pickedModules.length===0?'Select modules above':`✅ Allocate ${pickedModules.length} Module${pickedModules.length>1?'s':''}`}
            </button>
            ${pickedModules.length>0?`<div style="margin-top:10px;font-size:12px;color:#6b7280;text-align:center;line-height:1.5">Student will be notified immediately via their portal</div>`:''}
          </div>
        </div>
        ${allStudentAllocs.length>0?`
        <div style="background:white;border-radius:10px;border:1px solid #e5e7eb;overflow:hidden">
          <div style="background:#F4F6FB;border-bottom:1px solid #e5e7eb;padding:12px 18px;font-weight:700;font-size:13px;color:#001A4D">📚 Previous Allocations</div>
          <div style="padding:12px 16px">
            ${allStudentAllocs.map(r=>`<div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;margin-bottom:8px">
              <div style="background:#059669;color:white;padding:6px 12px;font-size:12px;font-weight:700;display:flex;justify-content:space-between"><span>Year ${r.studyYear}, Sem ${r.semester}</span><span>${r.modules.length} modules</span></div>
              <div style="padding:8px 12px">${r.modules.map(m=>`<div style="font-size:12px;color:#374151;display:flex;justify-content:space-between;margin-bottom:3px"><span>${m.name}</span><span style="color:#6b7280;font-family:monospace">${m.credits}cr</span></div>`).join('')}</div>
            </div>`).join('')}
          </div>
        </div>`:''}
      </div>
    </div>`;
}

function toggleModule(code){
  const qual=QUALIFICATIONS.find(q=>q.code===selectedApp.qualificationCode);
  const m=qual?.modules.find(x=>x.code===code);
  if(!m)return;
  if(pickedModules.some(p=>p.code===code)) pickedModules=pickedModules.filter(p=>p.code!==code);
  else pickedModules=[...pickedModules,m];
  render();
}

function openStudent(id){
  const apps=getApplications();
  const a=apps.find(x=>x.id===id); if(!a)return;
  selectedApp=a; studyYear=(a.studyYear||1); semester=1; pickedModules=[];
  step='allocate'; render();
}

function handleAllocate(){
  if(!selectedApp||pickedModules.length===0)return;
  doAllocateModules(selectedApp.id,pickedModules,semester,studyYear);
  justAllocated=selectedApp.studentId;
  showToast(`✅ ${pickedModules.length} modules allocated to ${selectedApp.firstName} ${selectedApp.lastName}`,'success');
  pickedModules=[];
  render();
}

render();
</script>
</body>
</html>
