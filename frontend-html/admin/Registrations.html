<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Registrations — Richfield Admin</title>
  <link rel="stylesheet" href="../shared.css"/>
  <style>.filter-btn{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--rf-border);background:white;color:var(--rf-navy)}.filter-btn.active{background:var(--rf-blue);color:white;border-color:var(--rf-blue)}</style>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content">
  <h1 class="section-title">REGISTRATIONS</h1>
  <p class="section-subtitle">Review and approve module registrations</p>
  <div id="filter-bar" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap"></div>
  <div class="card" id="table-wrap"></div>
</div>

<!-- VIEW MODAL -->
<div id="view-modal" class="modal-overlay hidden">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title">Registration Details</div>
      <button class="modal-close" onclick="closeModal('view-modal')">×</button>
    </div>
    <div class="modal-body" id="view-body"></div>
    <div class="modal-footer" id="view-footer"></div>
  </div>
</div>

<!-- DECLINE MODAL -->
<div id="decline-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Decline Registration</div>
      <button class="modal-close" onclick="closeModal('decline-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-warning" style="margin-bottom:16px"><span>⚠️</span> <span id="decline-msg"></span></div>
      <div class="form-group">
        <label class="form-label">Reason <span class="required">*</span></label>
        <textarea id="decline-reason" class="form-textarea" placeholder="e.g. outstanding fees, prerequisites not met..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('decline-modal')">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDecline()">Confirm Decline</button>
    </div>
  </div>
</div>

<script src="../shared-local.js"></script>
<script>
requireAuth('admin');
renderNavbar('admin-regs');

let currentFilter='all';
let selectedReg=null;

function render(){
  const regs=getRegistrations();
  const counts={all:regs.length,pending:regs.filter(r=>r.status==='pending').length,approved:regs.filter(r=>r.status==='approved').length,declined:regs.filter(r=>r.status==='declined').length};
  document.getElementById('filter-bar').innerHTML=['all','pending','approved','declined'].map(f=>
    `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${f} (${counts[f]})</button>`
  ).join('');
  const filtered=currentFilter==='all'?regs:regs.filter(r=>r.status===currentFilter);
  if(filtered.length===0){
    document.getElementById('table-wrap').innerHTML=`<div style="padding:48px;text-align:center;color:var(--rf-gray)"><div style="font-size:40px;margin-bottom:12px">📝</div><div>No ${currentFilter==='all'?'':currentFilter} registrations found</div></div>`;
    return;
  }
  document.getElementById('table-wrap').innerHTML=`<table class="data-table"><thead><tr><th>Student ID</th><th>Qualification</th><th>Semester/Year</th><th>Modules</th><th>Fee</th><th>Status</th><th>Actions</th></tr></thead><tbody>
  ${filtered.map(r=>`<tr>
    <td style="font-family:var(--font-mono);font-size:12px;color:var(--rf-blue)">${r.studentId}</td>
    <td><div style="font-weight:600;font-size:13px">${r.qualificationCode}</div><div style="font-size:12px;color:var(--rf-gray)">${r.qualificationName}</div></td>
    <td style="font-size:13px">Sem ${r.semester}, ${r.year}</td>
    <td style="font-size:13px">${r.modules.length} modules</td>
    <td style="font-size:13px;font-weight:600">R${r.totalFee.toLocaleString()}</td>
    <td>${badge(r.status)}</td>
    <td><div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-secondary" onclick="openView('${r.id}')">View</button>
      ${r.status==='pending'?`<button class="btn btn-sm btn-success" onclick="doApprove('${r.id}')">✓</button><button class="btn btn-sm btn-danger" onclick="openDecline('${r.id}')">✗</button>`:''}
    </div></td>
  </tr>`).join('')}
  </tbody></table>`;
}

function setFilter(f){currentFilter=f;render();}

function openView(id){
  const r=getRegistrations().find(x=>x.id===id); if(!r)return;
  selectedReg=r;
  document.getElementById('view-body').innerHTML=`
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      ${badge(r.status)}<span class="badge badge-info" style="font-family:var(--font-mono)">${r.studentId}</span>
      <span class="badge badge-info">Sem ${r.semester}, ${r.year}</span>
    </div>
    <div style="border:1px solid var(--rf-border);border-radius:8px;overflow:hidden;margin-bottom:16px">
      <div style="background:var(--rf-offwhite);padding:10px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--rf-border)">${r.qualificationName} (${r.qualificationCode})</div>
      <div style="padding:14px">
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">Registered Modules (${r.modules.length})</div>
        ${r.modules.map(m=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 12px;background:var(--rf-offwhite);border-radius:6px;margin-bottom:6px">
          <span><strong style="font-family:var(--font-mono)">${m.code}</strong> — ${m.name}</span>
          <span style="color:var(--rf-gray)">${m.credits} credits</span>
        </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;gap:12px;justify-content:space-between;font-size:14px;flex-wrap:wrap">
      <div><span style="color:var(--rf-gray)">Total Fee: </span><strong>R${r.totalFee.toLocaleString()}</strong></div>
      <div><span style="color:var(--rf-gray)">Fee Status: </span><span style="font-weight:700;color:${r.feePaid?'var(--rf-success)':'var(--rf-error)'}">${r.feePaid?'✓ Paid':'✗ Unpaid'}</span></div>
      <div><span style="color:var(--rf-gray)">Submitted: </span><strong>${fmtDateTime(r.submittedAt)}</strong></div>
    </div>
    ${r.declineReason?`<div class="alert alert-error" style="margin-top:12px"><span>❌</span> ${r.declineReason}</div>`:''}`;
  document.getElementById('view-footer').innerHTML=r.status==='pending'?`
    <button class="btn btn-danger" onclick="closeModal('view-modal');openDecline('${r.id}')">✗ Decline</button>
    <button class="btn btn-success" onclick="closeModal('view-modal');doApprove('${r.id}')">✓ Approve Registration</button>`:'';
  openModal('view-modal');
}

function doApprove(id){
  approveRegistration(id);
  closeModal('view-modal');
  showToast('Registration approved!','success');
  render();
}

function openDecline(id){
  const r=getRegistrations().find(x=>x.id===id); if(!r)return;
  selectedReg=r;
  document.getElementById('decline-msg').innerHTML=`Declining registration for Student <strong>${r.studentId}</strong>.`;
  document.getElementById('decline-reason').value='';
  openModal('decline-modal');
}

function confirmDecline(){
  const reason=document.getElementById('decline-reason').value.trim();
  if(!reason)return showToast('Please provide a reason','error');
  declineRegistration(selectedReg.id,reason);
  closeModal('decline-modal');
  showToast('Registration declined.','info');
  render();
}

render();
</script>
</body>
</html>
