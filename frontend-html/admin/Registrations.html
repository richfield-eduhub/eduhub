<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Registrations — Admin — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content">
    <h1 class="section-title">REGISTRATIONS</h1>
    <p class="section-subtitle">Review and approve module registrations</p>
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap" id="filter-btns"></div>
    <div id="alert-box" class="mb-24"></div>
    <div class="card"><div id="regs-table"><div style="padding:48px;text-align:center;color:var(--rf-gray)">Loading...</div></div></div>
  </div>

  <div id="view-modal" class="modal-overlay hidden">
    <div class="modal modal-lg">
      <div class="modal-header"><span class="modal-title">Registration Details</span><button class="modal-close" onclick="closeModal('view-modal')">×</button></div>
      <div class="modal-body" id="view-modal-body"></div>
      <div class="modal-footer" id="view-modal-footer"></div>
    </div>
  </div>
  <div id="decline-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header"><span class="modal-title">Decline Registration</span><button class="modal-close" onclick="closeModal('decline-modal')">×</button></div>
      <div class="modal-body">
        <div class="alert alert-warning mb-24"><span>⚠️</span><div>Declining registration for Student <strong id="decline-student-id"></strong>.</div></div>
        <div class="form-group"><label class="form-label">Reason <span class="required">*</span></label><textarea id="decline-reason" class="form-textarea" placeholder="Reason for declining..."></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('decline-modal')">Cancel</button>
        <button id="confirm-decline-btn" class="btn btn-danger" onclick="confirmDecline()">Confirm Decline</button>
      </div>
    </div>
  </div>
  <div id="_toast" class="toast hidden"></div>

  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('admin');
    let currentFilter = 'all';
    let allRegs = [];
    let declineTargetId = null;
    if (user) { (async()=>{ await renderNavbar('registrations'); await loadPage(); })(); }

    async function loadPage() {
      allRegs = await getRegistrations();
      renderFilters(); renderTable();
    }

    function renderFilters() {
      const filters = ['all','pending','approved','declined','allocated'];
      document.getElementById('filter-btns').innerHTML = filters.map(f=>`
        <button onclick="setFilter('${f}',this)" class="btn btn-sm"
          style="background:${currentFilter===f?'var(--rf-blue)':'white'};color:${currentFilter===f?'white':'var(--rf-navy)'};border:1.5px solid var(--rf-border);text-transform:capitalize">
          ${f} (${allRegs.filter(r=>f==='all'||r.status===f).length})
        </button>`).join('');
    }

    function setFilter(f,el){currentFilter=f;document.querySelectorAll('#filter-btns button').forEach(b=>{b.style.background='white';b.style.color='var(--rf-navy)';});el.style.background='var(--rf-blue)';el.style.color='white';renderTable();}

    function renderTable() {
      const regs = allRegs.filter(r=>currentFilter==='all'||r.status===currentFilter);
      const tableEl = document.getElementById('regs-table');
      if (regs.length===0){tableEl.innerHTML=`<div style="padding:48px;text-align:center;color:var(--rf-gray)"><div style="font-size:40px;margin-bottom:12px">📝</div><div>No ${currentFilter==='all'?'':currentFilter} registrations</div></div>`;return;}
      tableEl.innerHTML=`<table class="data-table">
        <thead><tr><th>Student ID</th><th>Qualification</th><th>Period</th><th>Modules</th><th>Fee</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${regs.map(r=>`<tr>
          <td style="font-family:var(--font-mono);font-size:12px;color:var(--rf-blue)">${r.studentId}</td>
          <td><div style="font-weight:600;font-size:13px">${r.qualificationCode}</div><div style="font-size:12px;color:var(--rf-gray)">${r.qualificationName}</div></td>
          <td style="font-size:13px">Sem ${r.semester}, ${r.year}<br><span style="font-size:11px;color:var(--rf-gray)">Year ${r.studyYear}</span></td>
          <td style="font-size:13px">${r.modules.length} modules</td>
          <td style="font-size:13px;font-weight:600">R${r.totalFee.toLocaleString()}</td>
          <td>${badge(r.status)}</td>
          <td><div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-secondary" onclick="viewReg('${r.id}')">View</button>
          </div></td>
        </tr>`).join('')}</tbody></table>`;
    }

    function viewReg(id) {
      const r = allRegs.find(x=>x.id===id);
      if (!r) return;
      document.getElementById('view-modal-body').innerHTML=`
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
          ${badge(r.status)}
          <span class="badge badge-info" style="font-family:var(--font-mono)">${r.studentId}</span>
          <span class="badge badge-info">Sem ${r.semester}, ${r.year}</span>
        </div>
        <div style="border:1px solid var(--rf-border);border-radius:8px;overflow:hidden;margin-bottom:16px">
          <div style="background:var(--rf-offwhite);padding:10px 14px;font-weight:700;font-size:13px;border-bottom:1px solid var(--rf-border)">${r.qualificationName} (${r.qualificationCode})</div>
          <div style="padding:14px">
            <div style="font-weight:600;font-size:13px;margin-bottom:10px">Registered Modules (${r.modules.length})</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              ${r.modules.map(m=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 12px;background:var(--rf-offwhite);border-radius:6px"><span><strong style="font-family:var(--font-mono)">${m.code}</strong> — ${m.name}</span><span style="color:var(--rf-gray)">${m.credits} credits</span></div>`).join('')}
            </div>
          </div>
        </div>
        <div style="display:flex;gap:12px;justify-content:space-between;font-size:14px;flex-wrap:wrap">
          <div><span style="color:var(--rf-gray)">Fee: </span><strong>R${r.totalFee.toLocaleString()}</strong></div>
          <div><span style="color:var(--rf-gray)">Paid: </span><span style="font-weight:700;color:${r.feePaid?'var(--rf-success)':'var(--rf-error)'}">${r.feePaid?'✓ Paid':'✗ Unpaid'}</span></div>
          <div><span style="color:var(--rf-gray)">Submitted: </span><strong>${fmtDate(r.submittedAt)}</strong></div>
        </div>
        ${r.allocatedBy?`<div style="margin-top:12px;font-size:13px;color:var(--rf-gray)">Allocated by: <strong>${r.allocatedBy}</strong> on ${fmtDate(r.allocatedAt)}</div>`:''}
        ${r.declineReason?`<div class="alert alert-error" style="margin-top:12px"><span>❌</span> ${r.declineReason}</div>`:''}`;
      document.getElementById('view-modal-footer').innerHTML=`<button class="btn btn-secondary" onclick="closeModal('view-modal')">Close</button>`;
      openModal('view-modal');
    }

    function openDecline(id,studentId){declineTargetId=id;document.getElementById('decline-student-id').textContent=studentId;document.getElementById('decline-reason').value='';openModal('decline-modal');}
    async function confirmDecline(){
      const reason=document.getElementById('decline-reason').value.trim();
      if(!reason){alert('Please provide a reason.');return;}
      // No dedicated decline-registration API yet — this is a future enhancement
      closeModal('decline-modal'); showToast('Registration declined.','info');
      allRegs=await getRegistrations(); renderFilters(); renderTable();
    }
  </script>
</body>
</html>
