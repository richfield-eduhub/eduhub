<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content">
    <h1 class="section-title">ADMIN DASHBOARD</h1>
    <p class="section-subtitle">Overview of applications, registrations and student activity</p>
    <div class="grid-4 mb-24" id="stats-row">
      ${['📋','✅','🎓','📝'].map(i=>`<div class="stat-card"><div class="stat-icon" style="background:#F4F6FB"><span style="font-size:22px">${i}</span></div><div><div class="stat-value">—</div><div class="stat-label">Loading...</div></div></div>`).join('')}
    </div>
    <div class="grid-2 mb-24">
      <div class="card">
        <div class="card-header"><span class="card-title">Recent Applications</span><a href="/admin/applications" class="btn btn-sm btn-secondary">View All</a></div>
        <div id="recent-apps"><div style="padding:24px;text-align:center;color:var(--rf-gray)">Loading...</div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Quick Actions</span></div>
        <div class="card-body" style="display:flex;flex-direction:column;gap:12px" id="quick-actions"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Recent Activity</span></div>
      <div id="activity-table"><div style="padding:24px;text-align:center;color:var(--rf-gray)">Loading...</div></div>
    </div>
  </div>
  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('admin');
    if (user) { (async()=>{ await renderNavbar('dashboard'); await init(); })(); }

    async function init() {
      const [stats, apps, notifs] = await Promise.all([
        getStatistics(),
        getApplications(),
        getNotifications(),
      ]);

      // Stats cards
      const s = stats.ok ? stats : { users:{students:0}, applications:{pending:0,approved:0}, registrations:{pending:0} };
      document.getElementById('stats-row').innerHTML = [
        { icon:'📋', label:'Pending Applications', value:s.applications?.pending||0,    color:'#FEF3C7' },
        { icon:'✅', label:'Approved Students',     value:s.applications?.approved||0,  color:'#D1FAE5' },
        { icon:'🎓', label:'Enrolled Students',     value:s.users?.students||0,         color:'#E0E7FF' },
        { icon:'📝', label:'Pending Registrations', value:s.registrations?.pending||0,  color:'#FCE7F3' },
      ].map(st => `
        <div class="stat-card">
          <div class="stat-icon" style="background:${st.color}"><span style="font-size:22px">${st.icon}</span></div>
          <div><div class="stat-value">${st.value}</div><div class="stat-label">${st.label}</div></div>
        </div>`).join('');

      // Quick actions
      document.getElementById('quick-actions').innerHTML = [
        { to:'/admin/applications',  icon:'📋', label:'Review Applications',   desc:`${s.applications?.pending||0} pending review` },
        { to:'/admin/registrations', icon:'📝', label:'Review Registrations',  desc:`${s.registrations?.pending||0} pending approval` },
        { to:'/admin/allocations',   icon:'📚', label:'Allocate Modules',      desc:'Assign modules to students', highlight:true },
        { to:'/admin/students',      icon:'🎓', label:'Manage Students',       desc:`${s.users?.students||0} enrolled students` },
      ].map(a => `
        <a href="${a.to}" style="display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid ${a.highlight?'#C7D2FE':'var(--rf-border)'};border-radius:var(--radius);transition:all .15s;color:var(--rf-navy);background:${a.highlight?'#EEF2FF':'white'};text-decoration:none"
          onmouseover="this.style.borderColor='var(--rf-blue)';this.style.background='var(--rf-light)'"
          onmouseout="this.style.borderColor='${a.highlight?'#C7D2FE':'var(--rf-border)'}';this.style.background='${a.highlight?'#EEF2FF':'white'}'">
          <span style="font-size:24px">${a.icon}</span>
          <div><div style="font-weight:600;font-size:14px">${a.label}</div><div style="font-size:13px;color:var(--rf-gray)">${a.desc}</div></div>
          <span style="margin-left:auto;color:var(--rf-blue)">→</span>
        </a>`).join('');

      // Recent applications
      const recent = apps.slice(0, 5);
      document.getElementById('recent-apps').innerHTML = recent.length === 0
        ? '<div style="padding:24px;text-align:center;color:var(--rf-gray);font-size:14px">No applications yet</div>'
        : `<table class="data-table">
            <thead><tr><th>Name</th><th>Qualification</th><th>Status</th></tr></thead>
            <tbody>${recent.map(a=>`
              <tr>
                <td style="font-weight:600">${a.firstName} ${a.lastName}</td>
                <td style="color:var(--rf-gray);font-size:13px">${a.qualificationCode}</td>
                <td>${badge(a.status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;

      // Activity (notifications)
      const recent6 = notifs.slice(0, 6);
      document.getElementById('activity-table').innerHTML = recent6.length === 0
        ? '<div style="padding:24px;text-align:center;color:var(--rf-gray);font-size:14px">No activity yet</div>'
        : `<table class="data-table">
            <thead><tr><th>Event</th><th>Message</th><th>Time</th></tr></thead>
            <tbody>${recent6.map(n=>`
              <tr>
                <td style="font-size:13px;font-weight:600">${n.title}</td>
                <td style="font-size:12px;color:var(--rf-gray)">${n.message.substring(0,80)}${n.message.length>80?'...':''}</td>
                <td style="font-size:12px;color:var(--rf-gray)">${fmtDate(n.createdAt)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;
    }
  </script>
</body>
</html>
