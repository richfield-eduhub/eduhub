<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Dashboard — Richfield</title>
  <link rel="stylesheet" href="../shared.css"/>
</head>
<body>
<div id="navbar-root"></div>
<div class="main-content">
  <h1 class="section-title">ADMIN DASHBOARD</h1>
  <p class="section-subtitle">Overview of applications, registrations and student activity</p>
  <div class="grid-4 mb-24" id="stats"></div>
  <div class="grid-2 mb-24">
    <div class="card">
      <div class="card-header"><span style="font-weight:700;font-size:15px">Recent Applications</span><a href="Applications.html" class="btn btn-sm btn-secondary">View All</a></div>
      <div id="recent-apps"></div>
    </div>
    <div class="card">
      <div class="card-header"><span style="font-weight:700;font-size:15px">Quick Actions</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:12px" id="quick-actions"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span style="font-weight:700;font-size:15px">Recent Activity</span></div>
    <div id="activity"></div>
  </div>
</div>
<script src="../shared-local.js"></script>
<script>
  const user = requireAuth('admin');
  renderNavbar('admin-dashboard');

  const apps  = getApplications();
  const regs  = getRegistrations();
  const users = getUsers();
  const notifs= getNotifications();
  const pending    = apps.filter(a=>a.status==='pending').length;
  const approved   = apps.filter(a=>a.status==='approved').length;
  const students   = users.filter(u=>u.role==='student').length;
  const pendingReg = regs.filter(r=>r.status==='pending').length;

  document.getElementById('stats').innerHTML = [
    {icon:'📋',label:'Pending Applications',value:pending,bg:'#FEF3C7'},
    {icon:'✅',label:'Approved Students',value:approved,bg:'#D1FAE5'},
    {icon:'🎓',label:'Registered Students',value:students,bg:'#E0E7FF'},
    {icon:'📝',label:'Pending Registrations',value:pendingReg,bg:'#FCE7F3'},
  ].map(s=>`<div class="stat-card"><div class="stat-icon" style="background:${s.bg}"><span style="font-size:22px">${s.icon}</span></div><div><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div></div>`).join('');

  const recent = [...apps].sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt)).slice(0,5);
  document.getElementById('recent-apps').innerHTML = recent.length===0
    ?'<div style="padding:24px;text-align:center;color:var(--rf-gray);font-size:14px">No applications yet</div>'
    :`<table class="data-table"><thead><tr><th>Name</th><th>Qualification</th><th>Status</th></tr></thead><tbody>
    ${recent.map(a=>`<tr><td style="font-weight:600">${a.firstName} ${a.lastName}</td><td style="color:var(--rf-gray);font-size:13px">${a.qualificationCode}</td><td>${badge(a.status)}</td></tr>`).join('')}
    </tbody></table>`;

  document.getElementById('quick-actions').innerHTML = [
    {href:'Applications.html',icon:'📋',label:'Review Applications',desc:`${pending} pending review`},
    {href:'Registrations.html',icon:'📝',label:'Review Registrations',desc:`${pendingReg} pending approval`},
    {href:'Students.html',icon:'🎓',label:'Manage Students',desc:`${students} enrolled students`},
    {href:'Allocations.html',icon:'📚',label:'Allocate Modules',desc:'Assign modules to approved students'},
  ].map(a=>`<a href="${a.href}" style="display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--rf-border);border-radius:var(--radius);transition:all .15s;color:var(--rf-navy);text-decoration:none" onmouseover="this.style.borderColor='var(--rf-blue)';this.style.background='var(--rf-light)'" onmouseout="this.style.borderColor='var(--rf-border)';this.style.background=''"><span style="font-size:24px">${a.icon}</span><div><div style="font-weight:600;font-size:14px">${a.label}</div><div style="font-size:13px;color:var(--rf-gray)">${a.desc}</div></div><span style="margin-left:auto;color:var(--rf-blue)">→</span></a>`).join('');

  const adminNotifs = notifs.filter(n=>n.userId===user.id).slice(0,6);
  document.getElementById('activity').innerHTML = adminNotifs.length===0
    ?'<div style="padding:24px;text-align:center;color:var(--rf-gray);font-size:14px">No activity yet</div>'
    :`<table class="data-table"><thead><tr><th>Event</th><th>Message</th><th>Time</th></tr></thead><tbody>
    ${adminNotifs.map(n=>`<tr><td>${badge(n.type==='success'?'approved':n.type==='error'?'declined':'info')}<br><span style="font-size:11px">${n.title}</span></td><td style="font-size:13px;color:var(--rf-gray);max-width:300px">${n.message.substring(0,80)}${n.message.length>80?'...':''}</td><td style="font-size:12px;color:var(--rf-gray)">${fmtDateTime(n.createdAt)}</td></tr>`).join('')}
    </tbody></table>`;
</script>
</body>
</html>
