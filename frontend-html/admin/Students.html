<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Students — Admin — EduHub</title>
  <link rel="stylesheet" href="../shared.css" />
</head>
<body class="page-container">
  <div id="navbar-placeholder"></div>
  <div class="main-content">
    <h1 class="section-title">STUDENTS</h1>
    <p class="section-subtitle" id="sub">Loading...</p>
    <div class="card"><div id="table-body"><div style="padding:32px;text-align:center;color:var(--rf-gray)">Loading...</div></div></div>
  </div>
  <div id="_toast" class="toast hidden"></div>
  <script src="../shared.js"></script>
  <script>
    const user = requireAuth('admin');
    if (user) { (async()=>{ await renderNavbar('students'); await init(); })(); }

    async function init() {
      const [adminUsers, apps, regs] = await Promise.all([
        getUsers(),
        getApplications(),
        getRegistrations(),
      ]);
      const students = adminUsers.filter(u=>u.role==='student');
      document.getElementById('sub').textContent = `${students.length} enrolled students`;

      const tableEl = document.getElementById('table-body');
      if (students.length===0) {
        tableEl.innerHTML=`<div style="padding:48px;text-align:center;color:var(--rf-gray)"><div style="font-size:40px;margin-bottom:12px">🎓</div><div>No students enrolled yet. Approve applications to create student accounts.</div></div>`;
        return;
      }
      tableEl.innerHTML=`<table class="data-table">
        <thead><tr><th>Name</th><th>Student ID</th><th>Email</th><th>Qualification</th><th>Modules</th><th>Account</th></tr></thead>
        <tbody>${students.map(s=>{
          const app=apps.find(a=>a.studentId===s.studentId&&a.status==='approved');
          const alloc=regs.filter(r=>r.studentId===s.studentId&&r.status==='allocated');
          const totalMods=alloc.reduce((sum,r)=>sum+r.modules.length,0);
          return `<tr>
            <td style="font-weight:600">${s.name}</td>
            <td style="font-family:var(--font-mono);font-size:12px;color:var(--rf-blue)">${s.studentId||'—'}</td>
            <td style="font-size:13px;color:var(--rf-gray)">${s.email}</td>
            <td style="font-size:13px">${app?.qualificationCode||'—'}</td>
            <td style="font-size:13px">${totalMods>0?`<span style="color:#059669;font-weight:700">✅ ${totalMods} modules</span>`:'<span style="color:var(--rf-gray)">Pending allocation</span>'}</td>
            <td>${s.tempPassword?`<span class="badge badge-pending">⚠ Temp password</span>`:`<span class="badge badge-approved">✓ Active</span>`}</td>
          </tr>`;
        }).join('')}</tbody></table>`;
    }
  </script>
</body>
</html>
